<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TARGET 1900 単語帳</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0f1318;
    --card:   #1a1f27;
    --border: #2d3340;
    --accent: #4fa3e8;
    --warm:   #e07b50;
    --gold:   #c9952a;
    --text:   #dde4ef;
    --dim:    #7a8494;
    --faint:  #3a4150;
    --green:  #3fb950;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont,
      'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'Meiryo', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
  }

  /* ════════════════════════════════
     トップ画面
  ════════════════════════════════ */
  #top-screen {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .top-header {
    padding: 36px 20px 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .top-logo {
    font-size: 26px; font-weight: 800;
    letter-spacing: 0.12em; color: var(--gold);
  }
  .top-edition {
    font-size: 13px; color: var(--dim);
    margin-top: 4px; letter-spacing: 0.08em;
  }
  .top-desc {
    font-size: 12px; color: var(--faint);
    margin-top: 10px; line-height: 1.6;
  }

  .section-title {
    font-size: 11px; color: var(--dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }

  /* グループグリッド */
  .group-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 14px 32px;
  }

  .gc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    transition: background .1s;
  }
  .gc:active { background: var(--border); }
  .gc.empty  { opacity: 0.28; cursor: not-allowed; pointer-events: none; }

  .gc-sec   { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
  .gc-range { font-size: 13px; font-weight: 700; color: var(--text); }
  .gc-count { font-size: 10px; color: var(--accent); margin-top: 2px; }
  .gc-count.none { color: var(--faint); }

  /* ════════════════════════════════
     カード画面
  ════════════════════════════════ */
  #card-screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    background: var(--bg);
  }

  /* ヘッダー */
  .hdr {
    height: 50px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 10px;
    flex-shrink: 0;
    z-index: 20;
  }
  .back-btn {
    width: 36px; height: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--dim); font-size: 18px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:active { background: var(--border); }
  .group-label {
    flex: 1;
    font-size: 13px; color: var(--dim);
    letter-spacing: 0.08em;
  }
  .ctr {
    font-size: 14px; color: var(--dim);
    flex-shrink: 0;
  }
  .ctr b { color: var(--accent); font-weight: 700; }

  /* プログレスバー */
  .prog-rail {
    height: 2px; background: var(--border); flex-shrink: 0;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--warm));
    transition: width .3s ease;
  }

  /* ビューポート */
  .vp {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* カードスロット */
  .card {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }

  /* カード本体 */
  .card-box {
    width: 100%; max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.35);
  }

  /*
   * 横スライドパネル（4枚）
   * panels コンテナを translateX(-mode * 25%) で動かすだけ
   */
  .panels {
    display: flex;
    width: 400%;   /* 4パネル分 */
  }

  .panel {
    width: 25%;          /* = card-box 幅の100% */
    padding: 26px 20px 22px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ── パネル0: 英単語 ── */
  .num-badge { font-size: 11px; color: var(--faint); letter-spacing: 0.16em; margin-bottom: 12px; }
  .phonetic  { font-size: 16px; color: var(--accent); font-style: italic; margin-bottom: 8px; }
  .word-en   { font-size: 44px; font-weight: 800; line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 10px; }
  .pos-chip  {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    background: var(--accent); color: #0f1318;
    padding: 3px 10px; border-radius: 20px;
  }

  /* ── パネル1: 意味 ── */
  .panel-lbl  { font-size: 10px; letter-spacing: 0.14em; color: var(--faint); margin-bottom: 14px; text-transform: uppercase; }
  .meaning-main { font-size: 26px; font-weight: 600; color: var(--gold); line-height: 1.3; margin-bottom: 10px; }
  .meaning-note { font-size: 13px; color: var(--dim); line-height: 1.6; }
  .ref-word     { font-size: 16px; color: var(--faint); font-style: italic; margin-top: 14px; }

  /* ── パネル2: 英語例文 ── */
  .ex-en {
    font-size: 20px; font-style: italic;
    color: var(--text); line-height: 1.8;
  }
  .ex-en .hl { color: var(--warm); font-style: normal; font-weight: 700; }

  /* ── パネル3: 和訳 ── */
  .ex-jp {
    font-size: 18px; color: var(--text);
    line-height: 1.8; margin-bottom: 14px;
  }
  .ex-en-small {
    font-size: 13px; color: var(--faint);
    font-style: italic; line-height: 1.6;
    border-left: 2px solid var(--faint);
    padding-left: 10px;
  }

  /* ヒント行 */
  .hints { display: flex; justify-content: space-between; margin-top: 18px; }
  .hint  { font-size: 11px; color: var(--faint); }

  /* ── ボトムバー ── */
  .bar {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 8px 14px 10px;
    display: flex; flex-direction: column; gap: 7px;
    flex-shrink: 0;
  }

  /* スライダー行 */
  .slider-row {
    display: flex; align-items: center; gap: 10px;
  }
  .slider-num {
    font-size: 12px; color: var(--accent);
    min-width: 52px; text-align: right;
    flex-shrink: 0;
  }
  .slider {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: var(--border); outline: none; cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 0 3px rgba(79,163,232,.25);
  }
  .slider:active::-webkit-slider-thumb {
    box-shadow: 0 0 0 6px rgba(79,163,232,.2);
  }

  /* モードドット */
  .dot-row { display: flex; gap: 7px; justify-content: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--faint); transition: background .15s; }
  .dot.on { background: var(--accent); transform: scale(1.3); }

  /* ボタン行 */
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; height: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--dim); font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:active { background: var(--border); }
  .btn.prev { color: var(--warm); border-color: #3a2418; }
  .btn.next { color: var(--accent); border-color: #1a3050; }
</style>
</head>
<body>

<!-- ══════════════ トップ画面 ══════════════ -->
<div id="top-screen">
  <div class="top-header">
    <div class="top-logo">TARGET 1900</div>
    <div class="top-edition">6訂版</div>
    <div class="top-desc">セクションを選んで学習を始めましょう</div>
  </div>
  <div class="section-title">セクション選択</div>
  <div class="group-grid" id="group-grid"></div>
</div>

<!-- ══════════════ カード画面 ══════════════ -->
<div id="card-screen">
  <div class="hdr">
    <button class="back-btn" onclick="goTop()">‹</button>
    <span class="group-label" id="group-label">Section 1</span>
    <span class="ctr"><b id="cur">1</b> / <span id="total">100</span></span>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog"></div></div>

  <div class="vp" id="vp"></div>

  <div class="bar">
    <div class="slider-row">
      <span class="slider-num" id="slider-num">No.1</span>
      <input class="slider" id="slider" type="range" min="0" max="99" value="0">
    </div>
    <div class="dot-row" id="dots">
      <div class="dot on"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="btn-row">
      <button class="btn prev" onclick="move(-1)">← 前の単語</button>
      <button class="btn next" onclick="move(1)">次の単語 →</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   単語データ
   ──────────────────────────────────────────────
   各エントリの形式:
   { num, en, ph, pos, jp, note, ex_en, ex_jp }

   num   : 単語番号（1〜1900）
   en    : 英単語
   ph    : 発音記号
   pos   : 品詞（日本語）
   jp    : 日本語の意味
   note  : 補足（構文・熟語など）
   ex_en : 英語例文（強調したい単語を <b>〜</b> で囲む）
   ex_jp : 例文の和訳

   ▼ 101番以降のデータを下に追記してください ▼
════════════════════════════════════════════════ */
const words = [
  { num:1, en:"agree", ph:"/əˈɡriː/", pos:"動詞", jp:"同意する・賛成する", note:"agree with … 「〜に同意する」", ex_en:"I <b>agree</b> with you on that point.", ex_jp:"その点についてはあなたに同意します。" },
  { num:2, en:"allow", ph:"/əˈlaʊ/", pos:"動詞", jp:"許可する・認める", note:"allow O to do 「Oが〜するのを許す」", ex_en:"My parents <b>allow</b> me to stay out until midnight.", ex_jp:"両親は私が真夜中まで外出することを許可しています。" },
  { num:3, en:"cause", ph:"/kɔːz/", pos:"動詞・名詞", jp:"引き起こす・原因", note:"cause O to do 「Oに〜させる」", ex_en:"The storm <b>caused</b> serious damage to the town.", ex_jp:"嵐は町に深刻な被害をもたらした。" },
  { num:4, en:"consider", ph:"/kənˈsɪdər/", pos:"動詞", jp:"〜を考慮する・みなす", note:"consider doing 「〜することを検討する」", ex_en:"We should <b>consider</b> all the options before deciding.", ex_jp:"決める前に全ての選択肢を考慮すべきだ。" },
  { num:5, en:"expect", ph:"/ɪkˈspekt/", pos:"動詞", jp:"期待する・予期する", note:"expect O to do 「Oが〜すると期待する」", ex_en:"I <b>expect</b> him to arrive by noon.", ex_jp:"彼が正午までに到着すると思っています。" },
  { num:6, en:"find", ph:"/faɪnd/", pos:"動詞", jp:"見つける・〜だとわかる", note:"find O C 「OがCだとわかる」", ex_en:"She <b>found</b> the book on the shelf.", ex_jp:"彼女は本棚に本を見つけた。" },
  { num:7, en:"force", ph:"/fɔːrs/", pos:"動詞・名詞", jp:"強制する・力", note:"force O to do 「Oに〜することを強制する」", ex_en:"The rain <b>forced</b> us to cancel the picnic.", ex_jp:"雨のせいでピクニックを中止せざるを得なかった。" },
  { num:8, en:"get", ph:"/ɡet/", pos:"動詞", jp:"得る・〜させる・〜になる", note:"get O to do / get O done", ex_en:"I'll <b>get</b> my hair cut this weekend.", ex_jp:"今週末に髪を切ってもらうつもりです。" },
  { num:9, en:"help", ph:"/help/", pos:"動詞・名詞", jp:"助ける・手伝う", note:"help O (to) do 「Oが〜するのを助ける」", ex_en:"Can you <b>help</b> me carry these boxes?", ex_jp:"これらの箱を運ぶのを手伝ってもらえますか？" },
  { num:10, en:"keep", ph:"/kiːp/", pos:"動詞", jp:"保つ・〜し続ける", note:"keep O C / keep doing 「〜し続ける」", ex_en:"Please <b>keep</b> the door closed while the AC is on.", ex_jp:"エアコンをつけている間はドアを閉めておいてください。" },
  { num:11, en:"leave", ph:"/liːv/", pos:"動詞", jp:"去る・〜のままにしておく", note:"leave O C 「OをCのままにしておく」", ex_en:"Don't <b>leave</b> the window open when you go out.", ex_jp:"出かけるときは窓を開けたままにしないでください。" },
  { num:12, en:"let", ph:"/let/", pos:"動詞", jp:"〜させる・許可する", note:"let O do 「Oに〜させる」", ex_en:"My boss <b>let</b> me leave work early today.", ex_jp:"上司は今日、私を早退させてくれた。" },
  { num:13, en:"make", ph:"/meɪk/", pos:"動詞", jp:"作る・〜させる", note:"make O do 「Oに〜させる」/ make O C", ex_en:"The movie <b>made</b> me cry.", ex_jp:"その映画は私を泣かせた。" },
  { num:14, en:"notice", ph:"/ˈnoʊtɪs/", pos:"動詞・名詞", jp:"気づく・通知", note:"notice O doing 「Oが〜しているのに気づく」", ex_en:"Did you <b>notice</b> anything unusual about his behavior?", ex_jp:"彼の行動に何か異常なものに気づきましたか？" },
  { num:15, en:"order", ph:"/ˈɔːrdər/", pos:"動詞・名詞", jp:"命令する・注文する・順序", note:"order O to do 「Oに〜するよう命じる」", ex_en:"The doctor <b>ordered</b> him to rest for a week.", ex_jp:"医師は彼に1週間休むよう命じた。" },
  { num:16, en:"permit", ph:"/pərˈmɪt/", pos:"動詞・名詞", jp:"許可する・許す", note:"permit O to do 「Oが〜するのを許可する」", ex_en:"Smoking is not <b>permitted</b> inside the building.", ex_jp:"建物内での喫煙は許可されていません。" },
  { num:17, en:"prevent", ph:"/prɪˈvent/", pos:"動詞", jp:"防ぐ・妨げる", note:"prevent O from doing 「Oが〜するのを妨げる」", ex_en:"Wearing a mask can <b>prevent</b> you from getting sick.", ex_jp:"マスクをすることで病気にかかるのを防げる。" },
  { num:18, en:"promise", ph:"/ˈprɒmɪs/", pos:"動詞・名詞", jp:"約束する・保証する", note:"promise to do / promise that …", ex_en:"She <b>promised</b> to call me when she arrived.", ex_jp:"彼女は到着したら電話すると約束した。" },
  { num:19, en:"require", ph:"/rɪˈkwaɪər/", pos:"動詞", jp:"必要とする・要求する", note:"require O to do 「Oに〜することを要求する」", ex_en:"The job <b>requires</b> you to work on weekends.", ex_jp:"その仕事は週末に働くことを要求する。" },
  { num:20, en:"seem", ph:"/siːm/", pos:"動詞", jp:"〜のように見える・思われる", note:"seem to do / seem like …", ex_en:"He <b>seems</b> to be very tired today.", ex_jp:"彼は今日とても疲れているようだ。" },
  { num:21, en:"spend", ph:"/spend/", pos:"動詞", jp:"（時間・お金を）費やす・使う", note:"spend O doing 「〜するのにOを費やす」", ex_en:"She <b>spends</b> hours reading every evening.", ex_jp:"彼女は毎晩何時間も読書に費やす。" },
  { num:22, en:"stop", ph:"/stɒp/", pos:"動詞", jp:"止まる・やめる", note:"stop doing 「〜するのをやめる」/ stop to do 「〜するために立ち止まる」", ex_en:"Please <b>stop</b> talking during the exam.", ex_jp:"試験中は話すのをやめてください。" },
  { num:23, en:"suggest", ph:"/səˈdʒest/", pos:"動詞", jp:"提案する・示唆する", note:"suggest doing / suggest that …", ex_en:"He <b>suggested</b> going to the beach for the holiday.", ex_jp:"彼は休日にビーチへ行くことを提案した。" },
  { num:24, en:"tell", ph:"/tel/", pos:"動詞", jp:"伝える・命じる・わかる", note:"tell O to do 「Oに〜するよう言う」", ex_en:"She <b>told</b> me to wait outside.", ex_jp:"彼女は私に外で待つよう言った。" },
  { num:25, en:"try", ph:"/traɪ/", pos:"動詞", jp:"試みる・努力する", note:"try to do 「〜しようとする」/ try doing 「試しに〜してみる」", ex_en:"He <b>tried</b> to open the door but it was locked.", ex_jp:"彼はドアを開けようとしたが、鍵がかかっていた。" },
  { num:26, en:"want", ph:"/wɒnt/", pos:"動詞", jp:"欲しい・〜したい", note:"want O to do 「Oに〜してほしい」", ex_en:"I <b>want</b> you to finish this report by tomorrow.", ex_jp:"明日までにこのレポートを終わらせてほしい。" },
  { num:27, en:"wish", ph:"/wɪʃ/", pos:"動詞・名詞", jp:"望む・〜であればよいのに", note:"wish O could do / wish (that) …", ex_en:"I <b>wish</b> I could speak French fluently.", ex_jp:"フランス語を流暢に話せればよいのに。" },
  { num:28, en:"ask", ph:"/æsk/", pos:"動詞", jp:"尋ねる・頼む", note:"ask O to do 「Oに〜するよう頼む」", ex_en:"She <b>asked</b> me to help her move the furniture.", ex_jp:"彼女は私に家具を動かすのを手伝うよう頼んだ。" },
  { num:29, en:"avoid", ph:"/əˈvɔɪd/", pos:"動詞", jp:"避ける", note:"avoid doing 「〜するのを避ける」", ex_en:"You should <b>avoid</b> eating too much sugar.", ex_jp:"砂糖の食べ過ぎは避けるべきだ。" },
  { num:30, en:"begin", ph:"/bɪˈɡɪn/", pos:"動詞", jp:"始まる・始める", note:"begin to do / begin doing", ex_en:"It <b>began</b> to rain heavily in the afternoon.", ex_jp:"午後、激しく雨が降り始めた。" },
  { num:31, en:"continue", ph:"/kənˈtɪnjuː/", pos:"動詞", jp:"続ける・続く", note:"continue to do / continue doing", ex_en:"Please <b>continue</b> to work hard.", ex_jp:"引き続き一生懸命働いてください。" },
  { num:32, en:"decide", ph:"/dɪˈsaɪd/", pos:"動詞", jp:"決める・決心する", note:"decide to do 「〜することに決める」", ex_en:"She <b>decided</b> to study abroad next year.", ex_jp:"彼女は来年留学することに決めた。" },
  { num:33, en:"deny", ph:"/dɪˈnaɪ/", pos:"動詞", jp:"否定する・拒否する", note:"deny doing 「〜したことを否定する」", ex_en:"He <b>denied</b> stealing the money.", ex_jp:"彼はお金を盗んだことを否定した。" },
  { num:34, en:"enable", ph:"/ɪˈneɪbl/", pos:"動詞", jp:"可能にする・できるようにする", note:"enable O to do 「Oが〜できるようにする」", ex_en:"Technology <b>enables</b> us to communicate instantly.", ex_jp:"テクノロジーは私たちが即座にコミュニケーションできるようにする。" },
  { num:35, en:"encourage", ph:"/ɪnˈkɜːrɪdʒ/", pos:"動詞", jp:"励ます・促す", note:"encourage O to do 「Oが〜するよう励ます」", ex_en:"Her teacher <b>encouraged</b> her to pursue her dream.", ex_jp:"先生は彼女に夢を追い求めるよう励ました。" },

/* ══════════════════════════════════════════════
   定数 / 状態
════════════════════════════════════════════════ */
const GROUP_SIZE   = 100;
const TOTAL_GROUPS = 19;   // 1〜1900 → 19グループ

let groupWords   = [];   // 現在のグループの単語配列
let groupOffset  = 0;    // グループ先頭の num - 1（表示用）
let cur          = 0;    // グループ内インデックス
let mode         = 0;    // 0=単語 1=意味 2=英語例文 3=和訳
let busy         = false;

const slots = [null, null, null]; // [前, 現在, 次]

const vpEl   = document.getElementById('vp');
const dotsEl = document.querySelectorAll('#dots .dot');
const slider = document.getElementById('slider');

/* ══════════════════════════════════════════════
   ユーティリティ
════════════════════════════════════════════════ */
function hl(s) {
  return s.replace(/<b>/g, '<span class="hl">').replace(/<\/b>/g, '</span>');
}

function pad3(n) { return String(n).padStart(3, '0'); }

/* ══════════════════════════════════════════════
   画面切替
════════════════════════════════════════════════ */
function showScreen(name) {
  document.getElementById('top-screen').style.display  = name === 'top'  ? 'flex'  : 'none';
  document.getElementById('card-screen').style.display = name === 'card' ? 'flex'  : 'none';
}

/* ══════════════════════════════════════════════
   トップ画面
════════════════════════════════════════════════ */
function initTopScreen() {
  const grid = document.getElementById('group-grid');
  grid.innerHTML = '';

  for (let g = 0; g < TOTAL_GROUPS; g++) {
    const start = g * GROUP_SIZE + 1;
    const end   = Math.min(start + GROUP_SIZE - 1, 1900);
    const gw    = words.filter(w => w.num >= start && w.num <= end);
    const empty = gw.length === 0;

    const el = document.createElement('div');
    el.className = 'gc' + (empty ? ' empty' : '');
    el.innerHTML = `
      <div class="gc-sec">Section ${g + 1}</div>
      <div class="gc-range">${start}–${end}</div>
      <div class="gc-count${empty ? ' none' : ''}">${empty ? '準備中' : gw.length + '語'}</div>
    `;
    if (!empty) el.onclick = () => startGroup(g);
    grid.appendChild(el);
  }

  showScreen('top');
}

/* ══════════════════════════════════════════════
   グループ開始
════════════════════════════════════════════════ */
function startGroup(g) {
  const start = g * GROUP_SIZE + 1;
  const end   = Math.min(start + GROUP_SIZE - 1, 1900);
  groupWords  = words.filter(w => w.num >= start && w.num <= end);
  groupOffset = start - 1;
  cur         = 0;
  mode        = 0;
  busy        = false;

  document.getElementById('group-label').textContent = `Section ${g + 1}  (${start}–${end})`;
  document.getElementById('total').textContent        = groupWords.length;

  // スライダー設定
  slider.min   = 0;
  slider.max   = groupWords.length - 1;
  slider.value = 0;
  updateSliderBg();

  showScreen('card');
  initSlots();
  syncUI();
}

/* ══════════════════════════════════════════════
   トップに戻る
════════════════════════════════════════════════ */
function goTop() {
  slots.forEach(s => { if (s) s.el.remove(); });
  slots.fill(null);
  initTopScreen();
}

/* ══════════════════════════════════════════════
   カード生成
════════════════════════════════════════════════ */
function mkCard(idx) {
  if (idx < 0 || idx >= groupWords.length) return null;
  const w  = groupWords[idx];
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-box">
      <div class="panels">

        <!-- パネル0: 英単語 -->
        <div class="panel">
          <div class="num-badge">No.${pad3(w.num)}</div>
          <div class="phonetic">${w.ph}</div>
          <div class="word-en">${w.en}</div>
          <div class="pos-chip">${w.pos}</div>
          <div class="hints">
            <span class="hint">↑↓ 単語を切替</span>
            <span class="hint">→ 意味を見る</span>
          </div>
        </div>

        <!-- パネル1: 意味 -->
        <div class="panel">
          <div class="panel-lbl">意味</div>
          <div class="meaning-main">${w.jp}</div>
          <div class="meaning-note">${w.note}</div>
          <div class="ref-word">${w.en}</div>
          <div class="hints">
            <span class="hint">← 単語に戻る</span>
            <span class="hint">→ 英語例文へ</span>
          </div>
        </div>

        <!-- パネル2: 英語例文 -->
        <div class="panel">
          <div class="panel-lbl">英語例文</div>
          <div class="ex-en">${hl(w.ex_en)}</div>
          <div class="hints" style="margin-top:20px">
            <span class="hint">← 意味に戻る</span>
            <span class="hint">→ 和訳を見る</span>
          </div>
        </div>

        <!-- パネル3: 和訳 -->
        <div class="panel">
          <div class="panel-lbl">和訳</div>
          <div class="ex-jp">${w.ex_jp}</div>
          <div class="ex-en-small">${hl(w.ex_en)}</div>
          <div class="hints" style="margin-top:14px">
            <span class="hint">← 英語例文に戻る</span>
            <span class="hint"></span>
          </div>
        </div>

      </div>
    </div>`;
  return el;
}

/* ══════════════════════════════════════════════
   スロット管理
════════════════════════════════════════════════ */
function snap(el, pos) {
  el.style.transition    = 'none';
  el.style.transform     = pos === 'above' ? 'translateY(-100%)' :
                           pos === 'below' ? 'translateY(100%)' : 'translateY(0)';
  el.style.opacity       = pos === 'center' ? '1' : '0';
  el.style.pointerEvents = pos === 'center' ? 'auto' : 'none';
}

function slidePanel(el, m, animate) {
  const p = el.querySelector('.panels');
  if (!p) return;
  p.style.transition = animate
    ? 'transform .26s cubic-bezier(.25,.46,.45,.94)'
    : 'none';
  p.style.transform = `translateX(${-m * 25}%)`;
}

function initSlots() {
  vpEl.innerHTML = '';
  const prev = mkCard(cur - 1);
  const curr = mkCard(cur);
  const next = mkCard(cur + 1);
  if (prev) { vpEl.appendChild(prev); snap(prev, 'above'); }
  vpEl.appendChild(curr);           snap(curr, 'center');
  if (next) { vpEl.appendChild(next); snap(next, 'below'); }
  slots[0] = prev ? { el: prev } : null;
  slots[1] = { el: curr };
  slots[2] = next ? { el: next } : null;
}

/* ══════════════════════════════════════════════
   UI同期
════════════════════════════════════════════════ */
function syncUI() {
  const w = groupWords[cur];
  document.getElementById('cur').textContent = cur + 1;
  document.getElementById('prog').style.width = ((cur + 1) / groupWords.length * 100) + '%';
  dotsEl.forEach((d, i) => d.classList.toggle('on', i === mode));
  slider.value = cur;
  document.getElementById('slider-num').textContent = 'No.' + w.num;
  updateSliderBg();
}

function updateSliderBg() {
  const max = parseInt(slider.max) || 1;
  const pct = (parseInt(slider.value) / max) * 100;
  slider.style.background =
    `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
}

/* ══════════════════════════════════════════════
   横スライド（モード切替）
════════════════════════════════════════════════ */
function setMode(m) {
  m = Math.max(0, Math.min(3, m));
  if (m === mode) return;
  mode = m;
  if (slots[1]) slidePanel(slots[1].el, mode, true);
  dotsEl.forEach((d, i) => d.classList.toggle('on', i === mode));
}

/* ══════════════════════════════════════════════
   縦スワイプ（単語切替）
════════════════════════════════════════════════ */
function move(dir) {
  if (busy) return;
  const next = cur + dir;
  if (next < 0 || next >= groupWords.length) return;
  busy = true;

  const fromSlot = slots[1];
  const toSlot   = dir > 0 ? slots[2] : slots[0];
  if (fromSlot) slidePanel(fromSlot.el, 0, false);
  if (!toSlot)  { busy = false; return; }

  const fromEl = fromSlot.el;
  const toEl   = toSlot.el;
  snap(toEl, dir > 0 ? 'below' : 'above');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const T = 'transform .28s cubic-bezier(.25,.46,.45,.94), opacity .2s';
      fromEl.style.transition    = T;
      toEl.style.transition      = T;
      fromEl.style.transform     = dir > 0 ? 'translateY(-100%)' : 'translateY(100%)';
      fromEl.style.opacity       = '0';
      fromEl.style.pointerEvents = 'none';
      toEl.style.transform       = 'translateY(0)';
      toEl.style.opacity         = '1';
      toEl.style.pointerEvents   = 'auto';
    });
  });

  setTimeout(() => {
    cur  = next;
    mode = 0;

    if (dir > 0) {
      if (slots[0]) slots[0].el.remove();
      slots[0] = slots[1];
      slots[1] = slots[2];
      snap(slots[0].el, 'above');
      const newEl = mkCard(next + 1);
      if (newEl) { vpEl.appendChild(newEl); snap(newEl, 'below'); slots[2] = { el: newEl }; }
      else slots[2] = null;
    } else {
      if (slots[2]) slots[2].el.remove();
      slots[2] = slots[1];
      slots[1] = slots[0];
      snap(slots[2].el, 'below');
      const newEl = mkCard(next - 1);
      if (newEl) { vpEl.appendChild(newEl); snap(newEl, 'above'); slots[0] = { el: newEl }; }
      else slots[0] = null;
    }

    const c = slots[1].el;
    c.style.transition    = 'none';
    c.style.transform     = 'translateY(0)';
    c.style.opacity       = '1';
    c.style.pointerEvents = 'auto';
    slidePanel(c, 0, false);

    busy = false;
    syncUI();
  }, 300);
}

/* ══════════════════════════════════════════════
   スライダー（ジャンプ）
════════════════════════════════════════════════ */
slider.addEventListener('input', function () {
  document.getElementById('slider-num').textContent =
    'No.' + groupWords[parseInt(this.value)].num;
  updateSliderBg();
});

slider.addEventListener('change', function () {
  const target = parseInt(this.value);
  if (target === cur || busy) return;
  jumpTo(target);
});

function jumpTo(target) {
  if (busy || target === cur) return;
  busy = true;
  mode = 0;

  const fromEl = slots[1].el;
  slidePanel(fromEl, 0, false);

  const dir    = target > cur ? 1 : -1;
  const newEl  = mkCard(target);
  if (!newEl) { busy = false; return; }
  vpEl.appendChild(newEl);
  snap(newEl, dir > 0 ? 'below' : 'above');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const T = 'transform .26s cubic-bezier(.25,.46,.45,.94), opacity .18s';
      fromEl.style.transition  = T;
      newEl.style.transition   = T;
      fromEl.style.transform   = dir > 0 ? 'translateY(-100%)' : 'translateY(100%)';
      fromEl.style.opacity     = '0';
      fromEl.style.pointerEvents = 'none';
      newEl.style.transform    = 'translateY(0)';
      newEl.style.opacity      = '1';
      newEl.style.pointerEvents = 'auto';
    });
  });

  setTimeout(() => {
    // 全スロットを再構築
    slots.forEach(s => { if (s) s.el.remove(); });
    vpEl.innerHTML = '';
    cur = target;

    const prev = mkCard(cur - 1);
    const curr = mkCard(cur);
    const next = mkCard(cur + 1);
    if (prev) { vpEl.appendChild(prev); snap(prev, 'above'); }
    vpEl.appendChild(curr);           snap(curr, 'center');
    if (next) { vpEl.appendChild(next); snap(next, 'below'); }
    slots[0] = prev ? { el: prev } : null;
    slots[1] = { el: curr };
    slots[2] = next ? { el: next } : null;

    busy = false;
    syncUI();
  }, 280);
}

/* ══════════════════════════════════════════════
   タッチ操作
════════════════════════════════════════════════ */
let tx = 0, ty = 0, tt = 0, axis = null, dragging = false;

vpEl.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  tt = Date.now(); dragging = true; axis = null;
}, { passive: true });

vpEl.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - tx;
  const dy = e.touches[0].clientY - ty;
  if (!axis && (Math.abs(dx) > 8 || Math.abs(dy) > 8))
    axis = Math.abs(dy) > Math.abs(dx) * 1.2 ? 'v' : 'h';
  if (axis === 'h') e.preventDefault();
}, { passive: false });

vpEl.addEventListener('touchend', e => {
  if (!dragging) return; dragging = false;
  if (Date.now() - tt > 500) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (axis === 'v' && Math.abs(dy) > 50) move(dy < 0 ? 1 : -1);
  if (axis === 'h' && Math.abs(dx) > 35) setMode(mode + (dx < 0 ? 1 : -1));
  axis = null;
});

/* ══════════════════════════════════════════════
   マウス（デスクトップ）
════════════════════════════════════════════════ */
let mx = 0, my = 0, maxis = null, mdown = false;
vpEl.addEventListener('mousedown', e => { mdown=true; mx=e.clientX; my=e.clientY; maxis=null; });
vpEl.addEventListener('mousemove', e => {
  if (!mdown) return;
  const dx=e.clientX-mx, dy=e.clientY-my;
  if (!maxis && (Math.abs(dx)>6||Math.abs(dy)>6))
    maxis = Math.abs(dx)>Math.abs(dy) ? 'h' : 'v';
});
vpEl.addEventListener('mouseup', e => {
  if (!mdown) return; mdown=false;
  const dx=e.clientX-mx, dy=e.clientY-my;
  if (maxis==='v' && Math.abs(dy)>40) move(dy<0?1:-1);
  if (maxis==='h' && Math.abs(dx)>35) setMode(mode+(dx<0?1:-1));
  maxis=null;
});

/* ══════════════════════════════════════════════
   キーボード
════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if      (e.key==='ArrowDown')  move(1);
  else if (e.key==='ArrowUp')    move(-1);
  else if (e.key==='ArrowRight') setMode(mode+1);
  else if (e.key==='ArrowLeft')  setMode(mode-1);
});

/* ══════════════════════════════════════════════
   起動
════════════════════════════════════════════════ */
initTopScreen();
</script>
</body>
</html>
