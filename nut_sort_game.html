<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ボールそろえパズル</title>
<style>
  :root{
    --bg-top:#0d0630;
    --bg-bottom:#1a0f4a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0;
    height:100%;
    height:100dvh; /* actual visible viewport on mobile Safari, where 100% can exceed it while the toolbar is shown */
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
  }
  body{
    background:
      radial-gradient(circle at 18% 8%, rgba(217,79,224,.28), transparent 42%),
      radial-gradient(circle at 88% 82%, rgba(79,195,247,.20), transparent 46%),
      radial-gradient(circle at 50% 100%, rgba(120,80,255,.18), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 30px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 30px),
      linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
  }
  #app{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:14px 10px 10px;
    position:relative;
  }
  .topbar{
    width:100%;
    max-width:480px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .icon-btn{
    width:50px; height:50px;
    border-radius:16px;
    border:none;
    background:linear-gradient(160deg,#d94fe0,#7a1fb0);
    box-shadow:0 4px 0 #5a1187, 0 6px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3);
    color:#fff;
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform .1s;
  }
  .icon-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #5a1187,0 2px 4px rgba(0,0,0,.4);}
  .title-wrap{ text-align:center; }
  .title{
    color:#f2f0ff;
    font-weight:800;
    font-size:25px;
    text-shadow:0 2px 0 rgba(0,0,0,.35), 0 0 18px rgba(180,120,255,.35);
    letter-spacing:.5px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .badges{
    display:flex; gap:6px; justify-content:center; margin-top:5px;
  }
  .badge{
    color:#d8d2f5;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);
  }
  .board-panel{
    flex:1;
    min-width:0;
    width:100%;
    max-width:560px;
    margin-top:10px;
    border-radius:26px;
    background:linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.015));
    border:1px solid rgba(255,255,255,.10);
    box-shadow:inset 0 2px 18px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.25);
    position:relative;
    overflow:hidden;
  }
  #board{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:repeat(auto-fit, 100px);
    justify-content:center;
    align-content:center;
    gap:4px 0;
    padding:10px 0;
    overflow:visible;
    transform-origin:50% 50%;
    transition:transform .15s ease;
  }
  .peg{
    width:100px;
    height:216px;
    position:relative;
    display:flex;
    justify-content:center;
    cursor:grab;
    touch-action:none;
    transition:filter .18s ease, opacity .18s ease;
  }
  .peg.dragging-source{ opacity:.35; }
  .peg.drop-valid{ filter:drop-shadow(0 0 4px rgba(120,255,180,.9)) drop-shadow(0 0 16px rgba(120,255,180,.6)); }
  .peg.drop-invalid{ filter:drop-shadow(0 0 4px rgba(255,90,90,.9)) drop-shadow(0 0 16px rgba(255,90,90,.55)); }
  .peg.shake{ animation:shake .35s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(6px); }
    60%{ transform:translateX(-4px); }
    80%{ transform:translateX(4px); }
  }
  .tube{
    position:absolute;
    bottom:6px;
    width:72px;
    height:198px;
    border-radius:12px 12px 32px 32px; /* flatter open mouth on top, rounded closed end on bottom - like a test tube */
    border:3px solid rgba(255,255,255,.28);
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    box-shadow:inset 0 0 14px rgba(255,255,255,.06), 0 4px 10px rgba(0,0,0,.3);
    transition:border-color .25s ease, box-shadow .25s ease;
    pointer-events:none;
  }
  .tube.complete{
    border-color:var(--tube-glow);
    box-shadow:0 0 8px var(--tube-glow), 0 0 20px var(--tube-glow), inset 0 0 16px rgba(255,255,255,.18);
  }
  .ball{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    box-shadow:
      inset -8px -10px 12px rgba(0,0,0,.35),
      inset 5px 6px 8px rgba(255,255,255,.45),
      0 3px 6px rgba(0,0,0,.35);
    transition:bottom .18s ease, filter .15s ease, transform .12s ease;
  }
  .peg.selected .ball.top-ball{
    transform:translateY(-16px) scale(1.08);
    filter:brightness(1.15) drop-shadow(0 0 10px rgba(255,255,255,.75));
  }
  .ball.ghost{
    z-index:999;
    pointer-events:none;
    margin:0;
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.5)) brightness(1.06);
  }
  @keyframes ballFly{
    0%{ transform:translate(0,0) scale(1.04); }
    45%{ transform:translate(calc(var(--dx) * .5), calc(var(--dy) * .5 - 30px)) scale(1.12); }
    100%{ transform:translate(var(--dx), var(--dy)) scale(1); }
  }
  .ball.flying{
    animation:ballFly .34s cubic-bezier(.32,.9,.35,1.15) forwards;
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.45));
  }
  .bottombar{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
    padding:8px 0 4px;
  }
  .action-btn{
    width:64px; height:64px;
    border-radius:20px;
    border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:26px;
    color:#fff;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.35), 0 8px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .1s;
  }
  .action-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.35);}
  .undo-btn{ background:linear-gradient(160deg,#d94fe0,#7a1fb0); }
  .reset-btn{ background:linear-gradient(160deg,#4fc3f7,#0277bd); }
  .moves{
    color:#d8d2f5;
    font-size:13px;
    font-weight:600;
    text-align:center;
    padding:5px 14px;
    border-radius:20px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
  }
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(5,2,20,.78);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    overflow:hidden;
  }
  .modal-overlay.show{ display:flex; }
  .confetti{
    position:absolute;
    top:-20px;
    width:9px; height:14px;
    border-radius:2px;
    opacity:.9;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(540deg); opacity:.3; }
  }
  .confetti-tanuki{
    width:170px;
    height:210px;
    border-radius:16px;
    background:transparent;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));
  }
  @keyframes tanukiFallSpin{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(720deg); opacity:.3; }
  }
  @keyframes tanukiDriftSide{
    0%{ transform:translate(0,0); opacity:1; }
    100%{ transform:translate(var(--driftX,120px), 108vh); opacity:.3; }
  }
  @keyframes tanukiBounce{
    0%{   transform:translateY(0)     scale(1,1);    opacity:1; }
    8%{   transform:translateY(6vh)   scale(1.15,.82); }
    16%{  transform:translateY(14vh)  scale(.88,1.16); }
    30%{  transform:translateY(32vh)  scale(1.15,.82); }
    44%{  transform:translateY(50vh)  scale(.88,1.16); }
    58%{  transform:translateY(68vh)  scale(1.15,.82); }
    72%{  transform:translateY(86vh)  scale(.88,1.16); }
    100%{ transform:translateY(108vh) scale(1,1);    opacity:.3; }
  }
  @keyframes tanukiCenterGrow{
    0%{   transform:translate(-50%,-50%) scale(.5); opacity:0; }
    20%{  opacity:1; }
    75%{  transform:translate(-50%,-50%) scale(3);   opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(3.8); opacity:0; }
  }
  .confetti-tanuki.motion-spin{ animation:tanukiFallSpin linear forwards; }
  .confetti-tanuki.motion-side{ animation:tanukiDriftSide linear forwards; }
  .confetti-tanuki.motion-bounce{ animation:tanukiBounce linear forwards; }
  .confetti-tanuki.motion-grow{
    top:50%; left:50%;
    animation:tanukiCenterGrow ease-out forwards;
  }
  @keyframes tanukiFastSpin{
    0%{   transform:rotate(0deg) scale(.8);    opacity:0; }
    15%{  transform:rotate(180deg) scale(1);   opacity:1; }
    85%{  opacity:1; }
    100%{ transform:rotate(1080deg) scale(1);  opacity:0; }
  }
  .confetti-tanuki.motion-fastspin{
    animation:tanukiFastSpin ease-out forwards;
  }
  @keyframes tanukiDiagonal{
    0%{   transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--dfx,150px), 108vh) rotate(var(--drot,150deg)); opacity:.3; }
  }
  .confetti-tanuki.motion-diagonal{
    animation:tanukiDiagonal linear forwards;
  }
  @keyframes tanukiTremble{
    0%{   transform:translate(0,0);        opacity:1; }
    5%{   transform:translate(-9px, 5vh); }
    10%{  transform:translate(9px, 11vh); }
    15%{  transform:translate(-9px, 16vh); }
    20%{  transform:translate(9px, 22vh); }
    25%{  transform:translate(-9px, 27vh); }
    30%{  transform:translate(9px, 33vh); }
    35%{  transform:translate(-9px, 38vh); }
    40%{  transform:translate(9px, 44vh); }
    45%{  transform:translate(-9px, 49vh); }
    50%{  transform:translate(9px, 55vh); }
    55%{  transform:translate(-9px, 60vh); }
    60%{  transform:translate(9px, 66vh); }
    65%{  transform:translate(-9px, 71vh); }
    70%{  transform:translate(9px, 77vh); }
    75%{  transform:translate(-9px, 82vh); }
    80%{  transform:translate(9px, 88vh); }
    85%{  transform:translate(-9px, 93vh); }
    90%{  transform:translate(9px, 99vh); }
    95%{  transform:translate(-9px, 104vh); }
    100%{ transform:translate(0, 109vh);      opacity:.3; }
  }
  .confetti-tanuki.motion-shake{
    animation:tanukiTremble linear forwards;
  }
  @keyframes tanukiVortex{
    0%{     transform:translate(15px, calc(0vh + 0px)) rotate(0deg);          opacity:0; }
    8%{     opacity:1; }
    12.5%{  transform:translate(-17px, calc(13.5vh + 8px)) rotate(120deg); }
    25%{    transform:translate(0px, calc(27vh - 16px)) rotate(240deg); }
    37.5%{  transform:translate(29px, calc(40.5vh + 15px)) rotate(360deg); }
    50%{    transform:translate(-50px, calc(54vh + 0px)) rotate(480deg); }
    62.5%{  transform:translate(42px, calc(67.5vh - 21px)) rotate(600deg); }
    75%{    transform:translate(0px, calc(81vh + 34px)) rotate(720deg); }
    87.5%{  transform:translate(-54px, calc(94.5vh - 27px)) rotate(840deg); }
    100%{   transform:translate(85px, calc(108vh + 0px)) rotate(960deg);      opacity:.3; }
  }
  .confetti-tanuki.motion-vortex{
    animation:tanukiVortex linear forwards;
  }
  @keyframes tanukiBlink{
    0%{   transform:translateY(0);      opacity:1; }
    10%{  opacity:.15; }
    20%{  opacity:1; }
    30%{  opacity:.15; }
    40%{  opacity:1; }
    50%{  opacity:.15; }
    60%{  opacity:1; }
    70%{  opacity:.15; }
    80%{  opacity:1; }
    90%{  opacity:.15; }
    100%{ transform:translateY(108vh); opacity:.3; }
  }
  .confetti-tanuki.motion-blink{
    animation:tanukiBlink linear forwards;
  }
  @keyframes tanukiPeek{
    /* translateY(42%) is constant throughout - it shifts the image down by
       42% of its OWN height (percentages in transform are self-relative),
       so the bottom ~42% always sits below the screen edge and gets cut off
       by the overlay's own overflow:hidden, rather than being clipped inside
       the artwork itself. Scales correctly with any random peek size. */
    0%{   transform:translateY(42%) translate(50px, 50px); opacity:0; }
    57%{  transform:translateY(42%) translate(50px, 50px); opacity:0; }
    70%{  transform:translateY(42%) translate(0,0);        opacity:1; }
    88%{  transform:translateY(42%) translate(0,0);        opacity:1; }
    100%{ transform:translateY(42%) translate(35px, 35px); opacity:0; }
  }
  .confetti-tanuki.motion-peek{
    top:auto;
    right:-10px;
    bottom:0;
    animation:tanukiPeek 3.5s ease-in-out forwards;
  }
  #deadlockFlash{
    position:fixed; inset:0;
    background:rgba(255,20,20,.4);
    pointer-events:none;
    opacity:0;
    z-index:60;
  }
  #deadlockFlash.flash{
    animation:deadlockPulse .7s ease;
  }
  @keyframes deadlockPulse{
    0%{ opacity:0; }
    18%{ opacity:1; }
    100%{ opacity:0; }
  }
  #deadlockTanuki{
    position:fixed;
    top:50%; left:50%;
    width:300px; height:300px;
    transform:translate(-50%,-50%) scale(.5);
    opacity:0;
    pointer-events:none;
    z-index:61;
    filter:drop-shadow(0 8px 22px rgba(0,0,0,.6));
  }
  #deadlockTanuki.show{
    animation:deadlockTanukiPop .5s ease;
  }
  @keyframes deadlockTanukiPop{
    0%{   opacity:0; transform:translate(-50%,-50%) scale(.5); }
    25%{  opacity:1; transform:translate(-50%,-50%) scale(1.06); }
    75%{  opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(.92); }
  }
  .tanuki-fountain{
    position:absolute;
    left:50%;
    bottom:0;
    width:90px;
    height:111px;
    border-radius:10px;
    background:transparent;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));
    animation:tanukiFountain ease-out forwards;
  }
  @keyframes tanukiFountain{
    0%{   transform:translate(-50%,0) scale(.4) rotate(0deg); opacity:0; }
    12%{  opacity:1; }
    50%{  transform:translate(calc(-50% + var(--fx,0px)), -68vh) scale(1) rotate(var(--frot,15deg)); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--fx2,0px)), -20vh) scale(.75) rotate(var(--frot2,30deg)); opacity:0; }
  }
  .card{
    background:linear-gradient(160deg,#2a1a5e,#150a38);
    border:2px solid #6a3fd1;
    border-radius:24px;
    padding:34px 30px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.6), 0 0 60px rgba(150,90,255,.25);
    max-width:320px;
    position:relative;
    z-index:1;
    animation:cardPop .35s cubic-bezier(.3,1.4,.5,1);
  }
  @keyframes cardPop{
    0%{ transform:scale(.7); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  #winCard{
    /* stays hidden so the tanuki celebration isn't blocked, until JS adds .reveal */
    opacity:0;
    transform:scale(.7);
    pointer-events:none;
    animation:none;
  }
  #winCard.reveal{
    pointer-events:auto;
    animation:cardPop .35s cubic-bezier(.3,1.4,.5,1) forwards;
  }
  #winBgImage{
    position:absolute;
    inset:0;
    background-repeat:no-repeat;
    background-position:center center;
    background-size:contain; /* keep full image visible, aspect ratio intact */
    display:none;
  }
  #winBgImage.show{
    display:block;
  }
  .card .trophy{ font-size:44px; margin-bottom:4px; }
  .card h2{
    color:#ffe066;
    margin:0 0 6px;
    font-size:26px;
    text-shadow:0 0 20px rgba(255,224,102,.5);
  }
  .card p{
    color:#c9c3e8;
    margin:0 0 20px;
    font-size:14px;
  }
  .card button{
    background:linear-gradient(160deg,#57e08a,#0c9450);
    border:none;
    color:#fff;
    font-weight:700;
    font-size:17px;
    padding:14px 30px;
    border-radius:16px;
    box-shadow:0 5px 0 #06612f;
    cursor:pointer;
  }
  .card button:active{ transform:translateY(3px); box-shadow:0 1px 0 #06612f; }
  .card.start-card{ max-width:340px; }
  .card .game-icon{ font-size:44px; margin-bottom:4px; }
  .diff-btn{
    display:block;
    width:100%;
    margin:8px 0 0;
    padding:14px 18px;
    border-radius:16px;
    border:none;
    cursor:pointer;
    text-align:left;
    color:#fff;
    font-weight:700;
    font-size:16px;
    box-shadow:0 4px 0 rgba(0,0,0,.35), 0 6px 10px rgba(0,0,0,.35);
    transition:transform .1s;
  }
  .diff-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.35); }
  .diff-btn .diff-desc{ display:block; font-weight:500; font-size:12px; opacity:.85; margin-top:3px; }
  .diff-btn.normal{ background:linear-gradient(160deg,#66d19e,#0c9450); }
  .diff-btn.hard{ background:linear-gradient(160deg,#ffb74d,#e65100); }
  .diff-btn.extreme{ background:linear-gradient(160deg,#ff6f7d,#8e1b3c); box-shadow:0 4px 0 #5c0f26, 0 6px 14px rgba(255,50,50,.35); }
  .badge.diff-normal{ background:rgba(102,209,158,.18); border-color:rgba(102,209,158,.4); color:#8ff0bf; }
  .badge.diff-hard{ background:rgba(255,183,77,.18); border-color:rgba(255,183,77,.4); color:#ffcf87; }
  .badge.diff-extreme{ background:rgba(255,111,125,.18); border-color:rgba(255,111,125,.45); color:#ff9aa4; }
  .level-picker{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin:14px 0 2px;
    color:#c9c3e8; font-size:13px;
  }
  .level-picker input{
    width:64px;
    padding:8px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.07);
    color:#fff;
    font-size:15px;
    font-weight:700;
    text-align:center;
  }
  .level-picker input:focus{ outline:2px solid #b78cf5; }
  .level-picker-hint{
    color:#9b93c9;
    font-size:11px;
    margin:0 0 8px;
  }
</style>
</head>
<body>
<div id="deadlockFlash"></div>
<img id="deadlockTanuki" alt="">
<div id="app">
  <div class="topbar">
    <button class="icon-btn" id="resetBtn2" title="やり直す">↺</button>
    <div class="title-wrap">
      <div class="title" id="levelTitle">🎱 レベル 1</div>
      <div class="badges" id="levelBadges"></div>
    </div>
    <button class="icon-btn" id="diffBtn" title="難易度を選ぶ">🎚️</button>
  </div>

  <div class="board-panel"><div id="board"></div></div>

  <div class="bottombar">
    <button class="action-btn undo-btn" id="undoBtn" title="元に戻す">⤺</button>
    <div class="moves" id="movesLabel">手数: 0</div>
    <button class="action-btn reset-btn" id="resetBtn" title="リセット">↺</button>
  </div>
</div>

<div id="overlay" class="modal-overlay">
  <div id="winBgImage"></div>
  <div class="card" id="winCard">
    <div class="trophy">🏆</div>
    <h2>クリア！</h2>
    <p id="clearSub">レベル 1 をクリアしました</p>
    <button id="nextBtn">次のレベルへ ▶</button>
  </div>
</div>

<div id="startOverlay" class="modal-overlay show">
  <div class="card start-card">
    <div class="game-icon">🎱</div>
    <h2>ボールそろえパズル</h2>
    <p>難易度を選んでください</p>
    <button class="diff-btn normal" data-diff="normal">ノーマル<span class="diff-desc">はじめての方向け</span></button>
    <button class="diff-btn hard" data-diff="hard">ハード<span class="diff-desc">色数が多く、空き筒少なめ</span></button>
    <button class="diff-btn extreme" data-diff="extreme">エクストリーム<span class="diff-desc">空き筒最小、上級者向け</span></button>
    <div class="level-picker">
      <label for="startLevelInput">開始レベル</label>
      <input type="number" id="startLevelInput" min="1" max="999" value="1" inputmode="numeric">
    </div>
    <p class="level-picker-hint">他の端末で進めていた場合、続きのレベル番号を入力してから難易度を選んでください</p>
  </div>
</div>

<script>
const CAPACITY = 4; // 1本の筒に4個のボール

// Hues are spread out (roughly every 25-40 degrees around the wheel) so no
// two colors sit close enough to be confused - the previous palette bunched
// yellow/lime/green/teal together in one narrow band, which was the problem.
const PALETTE = [
  {light:'#ffe066', dark:'#e0a800'}, // yellow      hue ~48

// Empty pegs are the only "workspace" the player has to temporarily park a
// nut, and empirically this puzzle needs at least 2 to stay reliably
// solvable as the color count grows (with only 1, boards become very often
// literally unsolvable once past ~5 colors). So difficulty is tuned purely
// through how many colors are in play and how fast that ramps up, capped at
// PALETTE.length (12), while always keeping a 2-peg buffer.
const DIFFICULTIES = {
  normal:  { label:'ノーマル',       baseColors:4, colorsEvery:1, emptyPegs:2 },
  hard:    { label:'ハード',         baseColors:6, colorsEvery:1, emptyPegs:2 },
  extreme: { label:'エクストリーム', baseColors:8, colorsEvery:1, emptyPegs:2 }
};

let difficulty = 'normal';
let level = 1;
let pegs = [];         // pegs[i] = array of color indices, index0 = bottom
let initialPegs = [];  // deep copy for reset
let history = [];      // {from,to}
let selected = null;
let moveCount = 0;
let interaction = null; // active pointer gesture state
const DRAG_THRESHOLD = 6;

const boardEl = document.getElementById('board');

function levelConfig(lv){
  const d = DIFFICULTIES[difficulty];
  const colorsCount = Math.min(d.baseColors + Math.floor((lv-1)/d.colorsEvery), PALETTE.length);
  return {colorsCount, emptyPegs: d.emptyPegs};
}

function deepCopy(p){ return p.map(peg=>peg.slice()); }

function isValidMove(from, to){
  if(from===to) return false;
  const fp = pegs[from], tp = pegs[to];
  if(fp.length===0) return false;
  if(tp.length>=CAPACITY) return false;
  if(tp.length===0) return true;
  return tp[tp.length-1] === fp[fp.length-1];
}

// -- generic helpers that operate on an arbitrary state, used by the solver --
function isValidMoveOn(state, from, to){
  if(from===to) return false;
  const fp = state[from], tp = state[to];
  if(fp.length===0) return false;
  if(tp.length>=CAPACITY) return false;
  if(tp.length===0) return true;
  return tp[tp.length-1] === fp[fp.length-1];
}

function isWinOn(state){
  for(const peg of state){
    if(peg.length===0) continue;
    if(peg.length!==CAPACITY) return false;
    const c = peg[0];
    for(const v of peg) if(v!==c) return false;
  }
  return true;
}

// Checks whether a board can still reach a win. Depth-first search with
// visited-state memoization, trying the most promising move first (same
// "complete/extend a run" heuristic as a human would use) so it typically
// solves in a handful of backtracks - but unlike pure greedy, it can
// backtrack out of dead ends instead of just giving up, which matters a lot
// once empty pegs are scarce.
//
// Returns {solvable, definitive}. `definitive` is true only when the search
// fully exhausted every reachable state (a real proof), vs. just running out
// of its node/time budget (inconclusive - treat as "don't know", not "no").
function analyzeSolvability(startPegs, opts){
  const nodeBudget = opts.nodeBudget;
  const timeBudget = opts.timeBudget;
  const startTime = performance.now();
  const visited = new Set();
  let nodes = 0;

  function stateKey(state){
    return state.map(p=>p.join('.')).join('|');
  }

  function scoreMove(state, f, t){
    const color = state[f][state[f].length-1];
    const destLenAfter = state[t].length+1;
    const srcLenAfter = state[f].length-1;
    let score = 0;
    if(destLenAfter===CAPACITY) score += 100;
    else if(state[t].length>0) score += 20;
    else score -= 5;
    if(srcLenAfter>0){
      if(state[f][srcLenAfter-1] !== color) score += 10;
    } else {
      score -= 3;
    }
    return score;
  }

  function genCandidates(state){
    const candidates = [];
    for(let f=0; f<state.length; f++){
      if(state[f].length===0) continue;
      for(let t=0; t<state.length; t++){
        if(!isValidMoveOn(state,f,t)) continue;
        candidates.push({from:f, to:t, score:scoreMove(state,f,t)});
      }
    }
    candidates.sort((a,b)=>b.score-a.score);
    return candidates;
  }

  // iterative DFS with an explicit stack (not recursion) so deep solutions
  // on large boards can't blow the JS call stack.
  const state = startPegs.map(p=>p.slice());
  if(isWinOn(state)) return {solvable:true, definitive:true};
  visited.add(stateKey(state));
  const stack = [{candidates: genCandidates(state), idx: 0, viaMove: null}];

  while(stack.length>0){
    nodes++;
    if(nodes>nodeBudget) return {solvable:false, definitive:false};
    if((nodes & 255)===0 && performance.now()-startTime>timeBudget) return {solvable:false, definitive:false};

    const top = stack[stack.length-1];
    if(top.idx >= top.candidates.length){
      stack.pop();
      if(stack.length===0) break;
      const nut = state[top.viaMove.to].pop();
      state[top.viaMove.from].push(nut);
      continue;
    }
    const c = top.candidates[top.idx++];
    const nut = state[c.from].pop();
    state[c.to].push(nut);

    if(isWinOn(state)) return {solvable:true, definitive:true};

    const key = stateKey(state);
    if(visited.has(key)){
      const back = state[c.to].pop();
      state[c.from].push(back);
      continue;
    }
    visited.add(key);
    stack.push({candidates: genCandidates(state), idx: 0, viaMove: c});
  }
  // stack fully unwound: every reachable state was explored and none won
  return {solvable:false, definitive:true};
}

function isSolvable(startPegs, opts){
  return analyzeSolvability(startPegs, opts).solvable;
}

function shuffleArrayInPlace(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}

function dealBoard(colorsCount, emptyPegs){
  const flat = [];
  for(let c=0;c<colorsCount;c++){
    for(let k=0;k<CAPACITY;k++) flat.push(c);
  }
  shuffleArrayInPlace(flat);

  const arr = [];
  for(let p=0;p<colorsCount;p++){
    arr.push(flat.slice(p*CAPACITY, (p+1)*CAPACITY));
  }
  for(let e=0;e<emptyPegs;e++) arr.push([]);
  shuffleArrayInPlace(arr); // don't let empty pegs always land at the end
  return arr;
}

function buildLevel(lv){
  const {colorsCount, emptyPegs} = levelConfig(lv);
  const nodeBudget = Math.min(150000, Math.max(20000, colorsCount * CAPACITY * 800));

  let candidate = null;
  // most boards solve within a modest search budget - try many of those first
  for(let attempt=0; attempt<40 && !candidate; attempt++){
    const dealt = dealBoard(colorsCount, emptyPegs);
    if(isWinOn(dealt)) continue;
    if(isSolvable(dealt, {nodeBudget, timeBudget:150})) candidate = dealt;
  }
  // fall back to a much bigger search budget on a few more tries rather than
  // ever shipping an unverified (possibly unsolvable) board
  for(let attempt=0; attempt<8 && !candidate; attempt++){
    const dealt = dealBoard(colorsCount, emptyPegs);
    if(isWinOn(dealt)) continue;
    if(isSolvable(dealt, {nodeBudget: nodeBudget*5, timeBudget:1200})) candidate = dealt;
  }
  pegs = candidate || dealBoard(colorsCount, emptyPegs);

  initialPegs = deepCopy(pegs);
  history = [];
  selected = null;
  moveCount = 0;
}

function isValidMove(from, to){
  return isValidMoveOn(pegs, from, to);
}

function checkWin(){
  return isWinOn(pegs);
}

function countValidMoves(){
  let count = 0;
  for(let f=0; f<pegs.length; f++){
    for(let t=0; t<pegs.length; t++){
      if(isValidMove(f,t)) count++;
    }
  }
  return count;
}

let wasStuck = false;
function checkDeadlock(){
  if(checkWin()){ wasStuck = false; return; }

  const validMoveCount = countValidMoves();
  let stuck = validMoveCount === 0;
  if(!stuck && validMoveCount <= 4){
    // Very few options left is exactly the shape of a "sennichite" trap -
    // e.g. the only legal moves just shuffle one ball back and forth between
    // two pegs. hasAnyValidMove() alone can't tell that apart from genuine
    // progress, so re-run the real solver from the CURRENT board; only trust
    // a definitive (fully-exhausted) "no" here to avoid false alarms.
    const result = analyzeSolvability(pegs, {nodeBudget:40000, timeBudget:200});
    if(result.definitive && !result.solvable) stuck = true;
  }

  if(stuck && !wasStuck){
    const flash = document.getElementById('deadlockFlash');
    flash.classList.remove('flash');
    void flash.offsetWidth; // restart the animation even if it's already mid-flash
    flash.classList.add('flash');

    const sadImg = document.getElementById('deadlockTanuki');
    sadImg.src = TANUKI_SAD_DATA_URI;
    sadImg.classList.remove('show');
    void sadImg.offsetWidth;
    sadImg.classList.add('show');
  }
  wasStuck = stuck;
}

// -- sound effects: real mp3 files, all embedded as base64 --
// Everything routes through ONE shared AudioContext + pre-decoded
// AudioBuffers instead of mixing in HTMLMediaElement (<audio>) playback.
// iOS Safari is strict about audio: <audio>.play() respects the phone's
// silent switch and needs to be triggered directly by a user gesture, while
// Web Audio playback behaves consistently and, once the shared context is
// actually running, stays usable even from a setTimeout-deferred call (like
// the win fanfare, which fires after the clear animation delay rather than
// synchronously inside the tap/click handler). Mixing both mechanisms was
// exactly why some sounds would work and others wouldn't on iPhone/iPad.
let sfxCtx = null;
const sfxBuffers = {};

function getSfxCtx(){
  if(!sfxCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    sfxCtx = new Ctx();
  }
  if(sfxCtx.state === 'suspended') sfxCtx.resume();
  return sfxCtx;
}

// iOS suspends the context again after the screen locks, the tab is
// backgrounded, a phone call/Siri interrupts, etc. - and won't let it resume
// from anything but a direct user gesture. Re-arming it on every touch
// anywhere on the page (not just peg touches) means the very next tap always
// re-enables sound before the player does something that expects to hear it.
document.addEventListener('pointerdown', getSfxCtx, {capture:true});

function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

async function loadSfxFromBase64(name, base64){
  try{
    const ctx = getSfxCtx();
    if(!ctx) return;
    sfxBuffers[name] = await ctx.decodeAudioData(base64ToArrayBuffer(base64));
  }catch(e){}
}

function playSfxBuffer(name, volume){
  const ctx = getSfxCtx();
  const buffer = sfxBuffers[name];
  if(!ctx || !buffer) return;
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.value = volume===undefined ? 1 : volume;
  src.connect(gain);
  gain.connect(ctx.destination);
  src.start(0);
}

loadSfxFromBase64('grab', GRAB_SFX_B64);
loadSfxFromBase64('put', PUT_SFX_B64);
loadSfxFromBase64('tubeComplete', TUBE_SFX_B64);
const CHEER_SFX_NAMES = [];
[CHEER_SFX_B64_1, CHEER_SFX_B64_2, CHEER_SFX_B64_3, CHEER_SFX_B64_4,
 CHEER_SFX_B64_5, CHEER_SFX_B64_6, CHEER_SFX_B64_7, CHEER_SFX_B64_8].forEach((b64, i)=>{
  const name = `cheer${i+1}`;
  CHEER_SFX_NAMES.push(name);
  loadSfxFromBase64(name, b64);
});

function playGrabSound(){
  playSfxBuffer('grab');
}

function playDropSound(){
  playSfxBuffer('put');
}

function playFanfare(){
  const name = CHEER_SFX_NAMES[Math.floor(Math.random()*CHEER_SFX_NAMES.length)];
  playSfxBuffer(name);
}

function playTubeCompleteSound(){
  playSfxBuffer('tubeComplete');
}

function doMove(from,to,record){
  const nut = pegs[from].pop();
  pegs[to].push(nut);
  if(record) history.push({from,to});
  moveCount++;
  playDropSound();
  const tube = pegs[to];
  if(tube.length === CAPACITY && tube.every(c => c === tube[0])){
    playTubeCompleteSound();
  }
}

function undo(){
  if(history.length===0) return;
  const last = history.pop();
  const nut = pegs[last.to].pop();
  pegs[last.from].push(nut);
  selected = null;
  moveCount = Math.max(0, moveCount-1);
  render();
}

function resetLevel(){
  pegs = deepCopy(initialPegs);
  history = [];
  selected = null;
  moveCount = 0;
  render();
}

function nextLevel(){
  level++;
  document.getElementById('overlay').classList.remove('show');
  buildLevel(level);
  render();
}

function topBallEl(idx){
  const pegEl = boardEl.children[idx];
  return pegEl ? pegEl.querySelector('.top-ball') : null;
}

function pegElAt(idx){
  return boardEl.children[idx] || null;
}

function findPegAt(x, y){
  const el = document.elementFromPoint(x, y);
  if(!el) return null;
  const pegEl = el.closest('.peg');
  if(!pegEl) return null;
  const idx = Number(pegEl.dataset.idx);
  return Number.isNaN(idx) ? null : idx;
}

// Some colors (currently the green replacement) are distinguished by a
// pattern instead of hue, since hue alone isn't enough for colorblind
// players. Shared by both the static render and the drag/fly ghost so they
// always look the same.
function applyBallLook(el, colorIdx){
  const col = PALETTE[colorIdx];
  if(col.pattern){
    el.style.backgroundColor = col.pattern.base;
    el.style.backgroundImage =
      `radial-gradient(circle 4px at 25% 25%, ${col.pattern.dot} 100%, transparent 100%),` +
      `radial-gradient(circle 4px at 75% 75%, ${col.pattern.dot} 100%, transparent 100%)`;
    el.style.backgroundSize = '16px 16px';
  } else {
    el.style.background = `radial-gradient(circle at 32% 28%, #ffffff 0%, ${col.light} 32%, ${col.dark} 100%)`;
  }
}

function makeGhostBall(colorIdx, rect){
  const g = document.createElement('div');
  g.className = 'ball top-ball ghost';
  applyBallLook(g, colorIdx);
  g.style.left = rect.left + 'px';
  g.style.top = rect.top + 'px';
  g.style.width = rect.width + 'px';
  g.style.height = rect.height + 'px';
  g.style.position = 'fixed';
  document.body.appendChild(g);
  return g;
}

function clearDropHighlights(){
  Array.from(boardEl.children).forEach(el=>{
    el.classList.remove('drop-valid','drop-invalid');
  });
}

// ---- tap-to-move flight animation ----
function performMove(from, to){
  const ballEl = topBallEl(from);
  const startRect = ballEl ? ballEl.getBoundingClientRect() : null;
  const colorIdx = pegs[from][pegs[from].length-1];

  doMove(from, to, true);
  selected = null;
  render();

  if(startRect){
    const destEl = topBallEl(to);
    if(destEl){
      const endRect = destEl.getBoundingClientRect();
      destEl.style.visibility = 'hidden';
      const ghost = makeGhostBall(colorIdx, startRect);
      ghost.style.setProperty('--dx', (endRect.left - startRect.left) + 'px');
      ghost.style.setProperty('--dy', (endRect.top - startRect.top) + 'px');
      requestAnimationFrame(()=> ghost.classList.add('flying'));
      ghost.addEventListener('animationend', ()=>{
        ghost.remove();
        destEl.style.visibility = '';
      }, {once:true});
    }
  }

  if(checkWin()){
    setTimeout(showWinOverlay, 380);
  }
}

function showWinOverlay(){
  document.getElementById('clearSub').textContent = `レベル ${level} をクリアしました（手数: ${moveCount}）`;
  const winCard = document.getElementById('winCard');
  winCard.classList.remove('reveal');
  const bgImg = document.getElementById('winBgImage');
  if(Math.random() < 0.10){
    bgImg.style.backgroundImage = "url('France.jpeg')";
    bgImg.classList.add('show');
  } else {
    bgImg.classList.remove('show');
  }
  spawnConfetti();
  if(Math.random() < 0.35) spawnTanukiFountain();
  playFanfare();
  document.getElementById('overlay').classList.add('show');
  // let the tanuki celebration have the screen to itself for a bit before
  // the card (which would otherwise sit on top of and hide them) pops in
  setTimeout(()=>{ winCard.classList.add('reveal'); }, 2800);
}

// Random size for celebratory tanuki - anywhere from full size down to a
// quarter of it, so a burst/fall doesn't look like identical stamped copies.
function randomTanukiScale(){
  // min stays the same (25% of base); max is now 2x the base size (was 1x)
  return 0.25 + Math.random()*1.75;
}

// A burst of tanuki gushing up from the bottom-center, like a fountain.
function spawnTanukiFountain(){
  const overlay = document.getElementById('overlay');
  overlay.querySelectorAll('.tanuki-fountain').forEach(c=>c.remove());
  const count = 10 + Math.floor(Math.random()*41); // 10-50
  for(let i=0;i<count;i++){
    const t = document.createElement('img');
    t.className = 'tanuki-fountain';
    t.src = TANUKI_DATA_URI;
    const scale = randomTanukiScale();
    t.style.width = (90*scale) + 'px';
    t.style.height = (111*scale) + 'px';
    const spread = (Math.random()-0.5) * 260;
    const rot = (Math.random()-0.5) * 60;
    t.style.setProperty('--fx', spread + 'px');
    t.style.setProperty('--fx2', (spread*1.4) + 'px');
    t.style.setProperty('--frot', rot + 'deg');
    t.style.setProperty('--frot2', (rot*1.8) + 'deg');
    t.style.animationDelay = (Math.random()*0.5) + 's';
    t.style.animationDuration = (1.3 + Math.random()*0.6) + 's';
    overlay.appendChild(t);
  }
}

const TANUKI_MOTIONS = ['spin', 'side', 'bounce', 'grow'];
const TANUKI_MOTIONS_RARE = ['fastspin', 'diagonal', 'shake', 'vortex', 'blink'];
// Weighted pick instead of array repetition, so the "suppressed" motions'
// rates can be tuned with fractional multipliers. Originals stay at weight 4
// each; the 5 rare motions and 'peek' were at half (2) and quarter (1) of
// that, respectively, then bumped up ~1.3x - which turned out to be too
// much, so that bump is now dialed back to ~70% of itself (net ~0.91x the
// original half/quarter rate).
const TANUKI_MOTION_WEIGHTS = {};
TANUKI_MOTIONS.forEach(m => TANUKI_MOTION_WEIGHTS[m] = 4);
TANUKI_MOTIONS_RARE.forEach(m => TANUKI_MOTION_WEIGHTS[m] = 2 * 1.3 * 0.7);
TANUKI_MOTION_WEIGHTS.peek = 1 * 1.3 * 0.7;

function pickTanukiMotion(){
  const entries = Object.entries(TANUKI_MOTION_WEIGHTS);
  const total = entries.reduce((sum,[,w]) => sum+w, 0);
  let r = Math.random() * total;
  for(const [name, w] of entries){
    if(r < w) return name;
    r -= w;
  }
  return entries[entries.length-1][0];
}

function spawnTanukiConfettiPiece(overlay){
  const motion = pickTanukiMotion();
  const c = document.createElement('img');
  c.className = `confetti confetti-tanuki motion-${motion}`;
  c.src = TANUKI_DATA_URI;
  const scale = randomTanukiScale();
  c.style.width = (170*scale) + 'px';
  c.style.height = (210*scale) + 'px';
  if(motion === 'grow'){
    // stays centered on screen instead of falling from a random column
    c.style.animationDuration = (1.9 + Math.random()*0.7) + 's';
    c.style.animationDelay = (Math.random()*.4) + 's';
  } else if(motion === 'fastspin'){
    // spins in place rather than falling down the screen
    c.style.top = (15 + Math.random()*55) + '%';
    c.style.left = Math.random()*85 + '%';
    c.style.animationDuration = (1.1 + Math.random()*0.6) + 's';
    c.style.animationDelay = (Math.random()*.5) + 's';
  } else if(motion === 'peek'){
    // does nothing for 2s, then a bigger tanuki peeks in from the corner
    // min stays the same; max is now 2x the old max (was 1.25x base, now 2.5x)
    const peekScale = 0.95 + Math.random()*1.55;
    c.style.width = (220*peekScale) + 'px';
    c.style.height = (272*peekScale) + 'px';
    c.style.animationDuration = '3.5s';
    c.style.animationDelay = '0s';
  } else {
    if(motion === 'side' || motion === 'diagonal'){
      const dir = Math.random() < 0.5 ? -1 : 1;
      const dist = 80 + Math.random()*140;
      c.style.setProperty('--driftX', (dir*dist) + 'px');
      c.style.setProperty('--dfx', (dir*dist) + 'px');
      c.style.setProperty('--drot', (dir*(90+Math.random()*120)) + 'deg');
    }
    c.style.left = Math.random()*100 + '%';
    c.style.animationDuration = (1.4 + Math.random()*1.4) + 's';
    c.style.animationDelay = (Math.random()*.6) + 's';
  }
  overlay.appendChild(c);
}

function spawnConfetti(){
  const overlay = document.getElementById('overlay');
  overlay.querySelectorAll('.confetti').forEach(c=>c.remove());

  for(let i=0;i<28;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    const col = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    c.style.background = col.light;
    c.style.left = Math.random()*100 + '%';
    c.style.animationDuration = (1.4 + Math.random()*1.2) + 's';
    c.style.animationDelay = (Math.random()*.6) + 's';
    overlay.appendChild(c);
  }

  // tanuki count is rolled on its own (1-20) instead of being an incidental
  // side effect of the confetti-square count, so the celebration reliably
  // has a decent number of them rather than sometimes just one or two.
  const tanukiCount = 1 + Math.floor(Math.random()*5);
  for(let i=0;i<tanukiCount;i++){
    spawnTanukiConfettiPiece(overlay);
  }
}

// ---- drag interaction ----
function onPegPointerDown(e, idx){
  if(interaction) return;
  if(e.button !== undefined && e.button !== 0) return;

  if(selected !== null && selected !== idx){
    interaction = {mode:'tapdest', toIdx: idx, pointerId: e.pointerId};
    return;
  }
  if(pegs[idx].length === 0) return;

  playGrabSound();

  const pegEl = e.currentTarget;
  interaction = {
    mode:'pickup',
    fromIdx: idx,
    pointerId: e.pointerId,
    startX: e.clientX,
    startY: e.clientY,
    moved:false,
    pegEl,
    ballEl:null,
    ghost:null,
    startRect:null
  };
  pegEl.setPointerCapture(e.pointerId);
  e.preventDefault();
}

function onPegPointerMove(e, idx){
  if(!interaction || interaction.mode !== 'pickup' || interaction.pointerId !== e.pointerId) return;
  const dx = e.clientX - interaction.startX, dy = e.clientY - interaction.startY;

  if(!interaction.moved && Math.hypot(dx,dy) > DRAG_THRESHOLD){
    interaction.moved = true;
    selected = null;
    const ballEl = topBallEl(interaction.fromIdx);
    if(!ballEl){ interaction.moved = false; return; }
    interaction.ballEl = ballEl;
    interaction.startRect = ballEl.getBoundingClientRect();
    ballEl.style.visibility = 'hidden';
    interaction.pegEl.classList.add('dragging-source');
    const colorIdx = pegs[interaction.fromIdx][pegs[interaction.fromIdx].length-1];
    interaction.ghost = makeGhostBall(colorIdx, interaction.startRect);
    interaction.ghost.style.transition = 'transform 60ms linear';
  }

  if(interaction.moved){
    interaction.ghost.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
    const hoverIdx = findPegAt(e.clientX, e.clientY);
    clearDropHighlights();
    if(hoverIdx !== null && hoverIdx !== interaction.fromIdx){
      const hoverEl = pegElAt(hoverIdx);
      if(hoverEl){
        hoverEl.classList.add(isValidMove(interaction.fromIdx, hoverIdx) ? 'drop-valid' : 'drop-invalid');
      }
    }
  }
}

function settleGhost(ghost, transform, duration, cb){
  ghost.style.transition = 'none';
  void ghost.offsetWidth;
  ghost.style.transition = `transform ${duration}ms cubic-bezier(.34,1.4,.6,1)`;
  requestAnimationFrame(()=>{ ghost.style.transform = transform; });
  ghost.addEventListener('transitionend', cb, {once:true});
}

function finishPickup(e){
  const it = interaction;
  if(!it.moved){
    // simple tap: select / deselect
    if(selected === null){ selected = it.fromIdx; }
    else if(selected === it.fromIdx){ selected = null; }
    render();
    interaction = null;
    return;
  }

  const dx = e.clientX - it.startX, dy = e.clientY - it.startY;
  const dropIdx = findPegAt(e.clientX, e.clientY);
  clearDropHighlights();
  it.pegEl.classList.remove('dragging-source');

  const valid = dropIdx !== null && dropIdx !== it.fromIdx && isValidMove(it.fromIdx, dropIdx);

  if(valid){
    doMove(it.fromIdx, dropIdx, true);
    render();
    const destEl = topBallEl(dropIdx);
    if(destEl){
      const endRect = destEl.getBoundingClientRect();
      destEl.style.visibility = 'hidden';
      const targetDx = endRect.left - it.startRect.left;
      const targetDy = endRect.top - it.startRect.top;
      settleGhost(it.ghost, `translate(${targetDx}px, ${targetDy}px) scale(1)`, 180, ()=>{
        it.ghost.remove();
        destEl.style.visibility = '';
        if(checkWin()) setTimeout(showWinOverlay, 200);
      });
    } else {
      it.ghost.remove();
    }
  } else {
    if(dropIdx !== null && dropIdx !== it.fromIdx){
      const targetEl = pegElAt(dropIdx);
      if(targetEl){
        targetEl.classList.add('shake');
        setTimeout(()=>targetEl.classList.remove('shake'), 360);
      }
    }
    settleGhost(it.ghost, 'translate(0,0) scale(1)', 220, ()=>{
      it.ghost.remove();
      it.ballEl.style.visibility = '';
    });
  }

  interaction = null;
}

function attemptTapDest(toIdx){
  const from = selected;
  if(isValidMove(from, toIdx)){
    performMove(from, toIdx);
  } else {
    selected = pegs[toIdx].length>0 ? toIdx : null;
    render();
  }
}

function onPegPointerUp(e, idx){
  if(!interaction || interaction.pointerId !== e.pointerId) return;
  if(interaction.mode === 'tapdest'){
    const toIdx = interaction.toIdx;
    interaction = null;
    attemptTapDest(toIdx);
    return;
  }
  finishPickup(e);
}

function onPegPointerCancel(e, idx){
  if(!interaction || interaction.pointerId !== e.pointerId) return;
  if(interaction.mode === 'pickup' && interaction.moved){
    clearDropHighlights();
    interaction.pegEl.classList.remove('dragging-source');
    if(interaction.ghost) interaction.ghost.remove();
    if(interaction.ballEl) interaction.ballEl.style.visibility = '';
  }
  interaction = null;
}

function attachPegHandlers(pegEl, idx){
  pegEl.addEventListener('pointerdown', e=>onPegPointerDown(e, idx));
  pegEl.addEventListener('pointermove', e=>onPegPointerMove(e, idx));
  pegEl.addEventListener('pointerup', e=>onPegPointerUp(e, idx));
  pegEl.addEventListener('pointercancel', e=>onPegPointerCancel(e, idx));
}

function render(){
  const {colorsCount, emptyPegs} = levelConfig(level);
  document.getElementById('levelTitle').textContent = `🎱 レベル ${level}`;
  const badges = document.getElementById('levelBadges');
  badges.innerHTML = `<span class="badge diff-${difficulty}">${DIFFICULTIES[difficulty].label}</span><span class="badge">色: ${colorsCount}</span><span class="badge">空き: ${emptyPegs}</span>`;
  document.getElementById('movesLabel').textContent = `手数: ${moveCount}`;

  boardEl.innerHTML = '';

  pegs.forEach((peg, idx)=>{
    const pegEl = document.createElement('div');
    pegEl.className = 'peg' + (selected===idx ? ' selected' : '');
    pegEl.dataset.idx = idx;
    attachPegHandlers(pegEl, idx);

    const isComplete = peg.length===CAPACITY && peg.every(c=>c===peg[0]);
    const tube = document.createElement('div');
    tube.className = 'tube' + (isComplete ? ' complete' : '');
    if(isComplete){
      tube.style.setProperty('--tube-glow', PALETTE[peg[0]].light);
    }
    pegEl.appendChild(tube);

    peg.forEach((colorIdx, j)=>{
      const ball = document.createElement('div');
      const isTop = (j === peg.length-1);
      ball.className = 'ball' + (isTop ? ' top-ball' : '');
      applyBallLook(ball, colorIdx);
      ball.style.bottom = (16 + j*42) + 'px';
      pegEl.appendChild(ball);
    });

    boardEl.appendChild(pegEl);
  });

  fitBoard();
  saveState();
  checkDeadlock();
}

// -- progress persistence: resume where you left off after closing the tab --
const SAVE_KEY = 'nutSortSave_v1';

function saveState(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({difficulty, level, pegs, initialPegs, history, moveCount}));
  }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || !DIFFICULTIES[data.difficulty] || !Array.isArray(data.pegs) || !Array.isArray(data.initialPegs)) return false;
    difficulty = data.difficulty;
    level = data.level;
    pegs = data.pegs;
    initialPegs = data.initialPegs;
    history = Array.isArray(data.history) ? data.history : [];
    moveCount = typeof data.moveCount === 'number' ? data.moveCount : 0;
    return true;
  }catch(e){
    return false;
  }
}

// Peg count varies a lot with difficulty (up to 12 colors + 2 empty = 14
// pegs), and on tall/narrow phones that can need more vertical space than
// the screen has. Rather than letting the board scroll internally (which is
// what caused nuts near the bottom to be unreachable without scrolling on
// an iPhone), shrink the whole grid down uniformly so every peg is always
// visible and reachable in one screen.
const boardPanelEl = document.querySelector('.board-panel');
function fitBoard(){
  const availW = boardPanelEl.clientWidth;
  const availH = boardPanelEl.clientHeight;
  if(availW===0 || availH===0) return;
  const pegW = 100, pegH = 216, rowGap = 4, vPad = 20;
  const columns = Math.max(1, Math.floor(availW / pegW));
  const rows = Math.max(1, Math.ceil(pegs.length / columns));
  const neededH = rows*pegH + (rows-1)*rowGap + vPad;
  const scale = Math.min(1, availH / neededH) * 0.98;
  boardEl.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitBoard);

function startGame(diffKey){
  const input = document.getElementById('startLevelInput');
  const requested = parseInt(input.value, 10);
  difficulty = diffKey;
  level = Number.isFinite(requested) && requested >= 1 ? requested : 1;
  document.getElementById('startOverlay').classList.remove('show');
  buildLevel(level);
  render();
}

document.getElementById('undoBtn').onclick = undo;
document.getElementById('resetBtn').onclick = resetLevel;
document.getElementById('resetBtn2').onclick = resetLevel;
document.getElementById('nextBtn').onclick = nextLevel;
document.getElementById('diffBtn').onclick = ()=>{
  document.getElementById('startLevelInput').value = level || 1;
  document.getElementById('startOverlay').classList.add('show');
};
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.onclick = ()=> startGame(btn.dataset.diff);
});

if(loadState()){
  document.getElementById('startOverlay').classList.remove('show');
  render();
}
</script>
