<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TARGET 1900 単語帳 v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117; --card-bg:#161b22; --surface:#21262d; --border:#30363d;
    --accent:#58a6ff; --gold:#e3b341; --text:#e6edf3; --muted:#8b949e;
    --c0:#484f58; --c1:#f78166; --c2:#e3b341; --c3:#3fb950;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;
    height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}

  /* ---- top bar ---- */
  #topbar{border-top:6px solid var(--c0);background:var(--card-bg);padding:8px 12px;
    display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;transition:border-color .25s}
  #topbar select,#topbar button,#topbar input{background:var(--surface);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit;cursor:pointer}
  #topbar input{cursor:text;width:110px}
  #topbar input::placeholder{color:var(--muted)}
  #topbar button:active{background:var(--border)}
  .spacer{flex:1}
  #counter{color:var(--muted);font-variant-numeric:tabular-nums}
  #seen{color:var(--muted)}

  /* ---- card area ---- */
  #stage{flex:1;position:relative;overflow:hidden;touch-action:none}
  .card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:22px 20px;text-align:center;transition:transform .28s ease,opacity .28s ease;overflow-y:auto}
  .word{font-family:'EB Garamond',serif;font-size:54px;font-weight:600;line-height:1.1;cursor:pointer;
    display:inline-flex;align-items:center;gap:12px}
  .word:active{color:var(--accent)}
  .spk{font-size:22px;color:var(--muted)}
  .ph{font-size:30px;color:var(--accent);font-family:'EB Garamond',serif;margin-top:10px}
  .pos{font-size:18px;color:var(--muted);margin-top:8px}
  .forms{font-size:16px;color:var(--gold);margin-top:14px;font-family:'EB Garamond',serif;letter-spacing:.5px}
  .jp{font-size:32px;font-weight:500;line-height:1.5}
  .note{font-size:20px;color:var(--muted);margin-top:18px;line-height:1.6}
  .exen{font-family:'EB Garamond',serif;font-size:32px;line-height:1.45;cursor:pointer}
  .exnav{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:14px}
  .exdot{width:8px;height:8px;border-radius:50%;background:var(--border)}
  .exdot.on{background:var(--accent)}
  .exarrow{background:var(--surface);color:var(--text);border:1px solid var(--border);
    border-radius:50%;width:34px;height:34px;font-size:18px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .exarrow:active{background:var(--border)}
  .exjp{font-size:24px;line-height:1.7}
  .alts{margin-top:20px;width:100%;max-width:620px;text-align:left}
  .alts summary{color:var(--muted);font-size:14px;cursor:pointer;text-align:center;margin-bottom:10px}
  .alts li{font-size:16px;color:var(--muted);line-height:1.9;list-style:none;
    border-bottom:1px solid var(--border);padding:4px 2px}
  .faceLabel{position:absolute;top:10px;left:0;right:0;font-size:11px;color:var(--muted);letter-spacing:2px}

  /* ---- bottom ---- */
  #bottom{background:var(--card-bg);border-top:1px solid var(--border);padding:10px 12px 14px;
    display:flex;flex-direction:column;gap:9px}
  #conf{display:flex;gap:6px}
  #conf button{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
    color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:.15s}
  #conf button.on{color:#0d1117;font-weight:700}
  #conf button[data-l="0"].on{background:var(--c0);color:#fff}
  #conf button[data-l="1"].on{background:var(--c1)}
  #conf button[data-l="2"].on{background:var(--c2)}
  #conf button[data-l="3"].on{background:var(--c3)}
  #nav{display:flex;gap:8px;align-items:center}
  #nav button{padding:10px 16px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);font-size:14px;cursor:pointer}
  #slider{flex:1;accent-color:var(--accent)}
  #dots{display:flex;justify-content:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
  .dot.on{background:var(--accent)}
  #empty{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;padding:30px;text-align:center;color:var(--muted)}
</style>
</head>
<body>

<div id="topbar">
  <select id="order">
    <option value="seq">Target順</option>
    <option value="other">Other順</option>
    <option value="pos">品詞順</option>
    <option value="rand">ランダム</option>
  </select>
  <select id="section">
    <option value="all">全1900語</option>
  </select>
  <select id="face">
    <option value="en">英→和</option>
    <option value="jp">和→英</option>
  </select>
  <button id="hideMax">自信MAX非表示</button>
  <button id="speak">🔊</button>
  <input id="search" type="text" placeholder="単語検索" autocomplete="off">
  <span class="spacer"></span>
  <span id="seen">👁 0</span>
  <span id="counter">0 / 0</span>
</div>

<div id="stage">
  <div class="card" id="card"></div>
  <div id="empty">
    <div style="font-size:20px">表示できる単語がありません</div>
    <div>「自信MAX非表示」を解除するか、自信度をリセットしてください</div>
    <button id="resetConf" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;cursor:pointer">自信度をリセット</button>
  </div>
</div>

<div id="bottom">
  <div id="dots"></div>
  <div id="conf">
    <button data-l="0">未設定</button>
    <button data-l="1">うろ覚え</button>
    <button data-l="2">まあまあ</button>
    <button data-l="3">完璧（除外）</button>
  </div>
  <div id="nav">
    <button id="prev">◀ 前</button>
    <input type="range" id="slider" min="0" max="0" value="0">
    <button id="next">次 ▶</button>
  </div>
</div>

<script id="csvdata" type="text/plain">num,en,ph,pos,jp,note,ex_en,ex_jp,ex_en2,ex_jp2,ex_en3,ex_jp3
1,create,/kriˈeɪt/,動詞,創造する・作る,create an opportunity 「機会を作る」,Art allows us to create something beautiful.,芸術は私たちが何か美しいものを作ることを可能にする。,She is creating a new painting this week.,彼女は今週、新しい絵を創作しているところだ。,A masterpiece had already been created before he was born.,彼が生まれる前にすでに傑作は生み出されていた。
2,increase,/ˈɪŋkriːs/,名詞・動詞,増加・増える,an increase in … 「〜の増加」,There has been a steady increase in prices.,価格に着実な増加が見られた。,Sales are increasing steadily this quarter.,今四半期、売上は着実に増加しているところだ。,Prices had already increased before the announcement.,その発表の前にすでに価格は上がっていた。
3,improve,/ɪmˈpruːv/,動詞,改善する・上達する,improve one's skills 「スキルを向上させる」,She works hard to improve her language skills.,彼女は語学力を向上させるために一生懸命取り組んでいる。,She is improving her language skills this year.,彼女は今年、語学力を向上させつつある。,The system had already been improved before the update.,そのアップデートの前にすでにそのシステムは改良されていた。
4,mean,/miːn/,動詞,意味する・〜するつもりである,mean to do 「〜するつもりである」,What does this word mean?,この単語はどういう意味ですか？,What does this word mean in English?,この単語は英語でどういう意味ですか。,I didn't mean to hurt your feelings.,あなたの気持ちを傷つけるつもりはなかった。
5,own,/oʊn/,動詞・形容詞,所有している・自身の,,She owns a small bookstore downtown.,彼女は繁華街で小さな書店を所有している。,She owns several small businesses now.,彼女は今、いくつかの小さな事業を所有している。,Does he own this building?,彼はこの建物を所有していますか。
6,include,/ɪnˈkluːd/,動詞,を含む,,The price includes breakfast and taxes.,その価格には朝食と税金が含まれている。,The price is including breakfast this month.,その価格は今月、朝食を含んでいるところだ。,Does the package include shipping?,そのパッケージには送料が含まれていますか。
7,consider,/kənˈsɪdər/,動詞,〜を考慮する・みなす,consider doing 「〜することを検討する」,We should consider all the options before deciding.,決める前に全ての選択肢を考慮すべきだ。,Please consider my proposal carefully.,私の提案をよく検討してください。,They considered her the best candidate for the job.,彼らは彼女をその仕事の最有力候補とみなした。
8,allow,/əˈlaʊ/,動詞,許可する・認める,allow O to do 「Oが〜するのを許す」,My parents allow me to stay out until midnight.,両親は私が真夜中まで外出することを許可しています。,The rules don't allow pets in this building.,この建物の規則ではペットは許可されていません。,She wasn't allowed to leave the meeting early.,彼女は会議を早退することを許されなかった。
9,suggest,/səˈdʒest/,動詞,提案する・示唆する,suggest doing / suggest that …,He suggested going to the beach for the holiday.,彼は休日にビーチへ行くことを提案した。,I suggest we take a short break.,少し休憩を取ることを提案します。,His silence suggested that something was wrong.,彼の沈黙は何かがおかしいことを示唆していた。
10,produce,/prəˈdjuːs/,動詞・名詞,生産する・もたらす,produce results 「結果をもたらす」,Hard work and dedication produce results.,努力と献身が結果をもたらす。,The factory is producing more units this month.,その工場は今月、より多くの製品を生産しているところだ。,Had the factory produced enough before the order arrived?,その注文が届く前に工場は十分に生産していましたか。
11,decide,/dɪˈsaɪd/,動詞,決める・決心する,decide to do 「〜することに決める」,She decided to study abroad next year.,彼女は来年留学することに決めた。,We need to decide on a date for the meeting.,会議の日程を決める必要がある。,She decided to change her career.,彼女は転職することを決意した。
12,offer,/ˈɒfər/,動詞・名詞,申し出る・提供する・申し出,offer to do 「〜することを申し出る」,She offered to drive me to the airport.,彼女は私を空港まで車で送ると申し出た。,They offered him a job in Tokyo.,彼らは彼に東京での仕事を提供した。,She made an offer to buy the house.,彼女はその家を買う申し出をした。
13,require,/rɪˈkwaɪər/,動詞,必要とする・要求する,require O to do 「Oに〜することを要求する」,The job requires you to work on weekends.,その仕事は週末に働くことを要求する。,The course requires a lot of reading.,このコースは多くの読書を必要とする。,Passengers are required to wear seat belts.,乗客はシートベルトの着用が義務付けられている。
14,share,/ʃeər/,動詞・名詞,共有する・分け合う,share information 「情報を共有する」,She shared her experiences with the group.,彼女はグループと自分の経験を共有した。,She is sharing her notes with classmates.,彼女はクラスメートとノートを共有しているところだ。,Had the information already been shared before the meeting?,その会議の前にすでにその情報は共有されていましたか。
15,store,/stɔːr/,動詞・名詞,保存する・店,,We store our files on the cloud.,私たちはファイルをクラウドに保存している。,They are storing extra supplies this month.,彼らは今月、余分な物資を保管しているところだ。,Had the data already been stored before the crash?,そのクラッシュの前にすでにそのデータは保存されていましたか。
16,tend,/tend/,動詞,〜する傾向がある・世話をする,tend to do 「〜する傾向がある」,People tend to eat more in winter.,人は冬により多く食べる傾向がある。,He tends to talk too fast when nervous.,彼は緊張すると早口になる傾向がある。,Nurses tend to patients around the clock.,看護師は24時間体制で患者の世話をする。
17,concern,/kənˈsɜːrn/,名詞・動詞,懸念・関心・心配する,express concern about … 「〜について懸念を示す」,He expressed concern about the project delay.,彼はプロジェクトの遅延について懸念を示した。,She is concerning herself with several details.,彼女はいくつかの詳細を気にかけているところだ。,Is there any concern about the schedule?,スケジュールについて何か懸念はありますか。
18,describe,/dɪˈskraɪb/,動詞,描写する・説明する,describe O as … 「OをAと描写する」,Can you describe what you saw at the scene?,現場で見たことを描写してもらえますか？,He is describing the accident to police.,彼はその事故について警察に説明しているところだ。,Had the suspect already been described before the arrest?,その逮捕の前にすでにその容疑者は特徴を説明されていましたか。
19,involve,/ɪnˈvɒlv/,動詞,含む・巻き込む・必要とする,involve doing 「〜することを必要とする」,The job involves traveling abroad frequently.,その仕事は頻繁に海外出張することを必要とする。,The project involves several departments.,そのプロジェクトはいくつかの部署を巻き込む。,Cooking involves a lot of preparation.,料理には多くの下準備が必要だ。
20,reduce,/rɪˈdjuːs/,動詞,減らす・削減する,reduce costs 「コストを削減する」,We should find ways to reduce energy consumption.,エネルギー消費を減らす方法を見つけるべきだ。,The company is reducing costs this year.,その会社は今年、コストを削減しているところだ。,Had emissions already been reduced before the new law?,その新しい法律の前にすでに排出量は削減されていましたか。
21,design,/dɪˈzaɪn/,動詞・名詞,設計する・デザイン,design a system 「システムを設計する」,She designed a new website for the company.,彼女は会社のための新しいウェブサイトを設計した。,She is designing a new logo this week.,彼女は今週、新しいロゴをデザインしているところだ。,Had the building already been designed before the budget was approved?,その予算が承認される前にすでにその建物は設計されていましたか。
22,force,/fɔːrs/,動詞・名詞,強制する・力,force O to do 「Oに〜することを強制する」,The rain forced us to cancel the picnic.,雨のせいでピクニックを中止せざるを得なかった。,The explosion forced everyone to evacuate the building.,爆発により全員が建物から避難を余儀なくされた。,He used force to open the stuck door.,彼は詰まったドアを開けるのに力を使った。
23,limit,/ˈlɪmɪt/,名詞・動詞,限界・制限・制限する,set a limit 「制限を設ける」,There is a limit to what one person can do.,一人の人間ができることには限界がある。,There are several limits on this account.,この口座にはいくつかの制限がある。,Is there a limit on how much I can withdraw?,引き出せる金額に制限はありますか。
24,bear,/beər/,動詞,を産む・を耐える・を運ぶ,,The tree bears fruit every autumn.,その木は毎秋実をつける。,The tree is bearing fruit again this year.,その木は今年もまた実をつけつつある。,Had the responsibility already been borne by the team before he joined?,彼が加わる前にすでにその責任はチームによって負われていましたか。
25,affect,/əˈfekt/,動詞,影響を与える,affect O 「Oに影響を与える」,The cold weather affected his health.,寒い天気が彼の健康に影響を与えた。,The storm is affecting flights today.,その嵐は今日、フライトに影響を与えているところだ。,Had the decision already been affected by public opinion?,その決定はすでに世論に影響されていましたか。
26,deal,/diːl/,動詞・名詞,対処する・扱う・取引,deal with … 「〜に対処する」,He knows how to deal with difficult customers.,彼は難しい顧客への対処法を知っている。,She is dealing with several complaints today.,彼女は今日、いくつかの苦情に対処しているところだ。,Had the issue already been dealt with before the meeting?,その会議の前にすでにその問題は対処されていましたか。
27,avoid,/əˈvɔɪd/,動詞,避ける,avoid doing 「〜するのを避ける」,You should avoid eating too much sugar.,砂糖の食べ過ぎは避けるべきだ。,You should avoid eating too much sugar.,砂糖を摂りすぎないようにすべきだ。,We took a detour to avoid the traffic jam.,私たちは渋滞を避けるために迂回した。
28,relate,/rɪˈleɪt/,動詞,関連する・共感する,relate to … 「〜に関連する」/ relate A to B,Can you relate to the character in the story?,物語の登場人物に共感できますか？,This topic is relating to several others.,この話題はいくつかの他の話題と関連している。,Is this issue related to the previous one?,この問題は前のものと関連していますか。
29,realize,/ˈriːəlaɪz/,動詞,に気づく・を実現する,,I didn't realize how late it was.,こんなに遅い時間だとは気づかなかった。,She is realizing her mistake right now.,彼女は今まさに自分の間違いに気づきつつある。,Had he already realized the truth before she told him?,彼女が彼に伝える前にすでに彼はその真実に気づいていましたか。
30,encourage,/ɪnˈkɜːrɪdʒ/,動詞,励ます・促す,encourage O to do 「Oが〜するよう励ます」,Her teacher encouraged her to pursue her dream.,先生は彼女に夢を追い求めるよう励ました。,Her teacher encouraged her to keep painting.,彼女の先生は絵を描き続けるよう彼女を励ました。,Good weather encourages people to go outside.,良い天気は人々を外出させる。
31,compare,/kəmˈpeər/,動詞,比較する,compare A with B / compare A to B,He compared the two proposals carefully.,彼は2つの提案を注意深く比較した。,She is comparing several options this week.,彼女は今週、いくつかの選択肢を比較しているところだ。,Had the prices already been compared before the purchase?,その購入の前にすでに価格は比較されていましたか。
32,measure,/ˈmeʒər/,名詞・動詞,手段・測定・測る,take measures to do 「〜するための措置を取る」,The government took measures to reduce pollution.,政府は汚染を減らすための措置を取った。,They are measuring several rooms today.,彼らは今日、いくつかの部屋を測定しているところだ。,Had the results already been measured before the report?,その報告書の前にすでにその結果は測定されていましたか。
33,exist,/ɪɡˈzɪst/,動詞,存在する,continue to exist 「存在し続ける」,Many endangered species continue to exist.,多くの絶滅危惧種が存在し続けている。,Several problems are existing in this system.,いくつかの問題がこのシステムに存在している。,Did this tradition exist before the war?,この伝統はその戦争の前から存在していましたか。
34,mark,/mɑːrk/,動詞・名詞,印をつける・跡,,She marked the important pages with a sticky note.,彼女は重要なページに付箋で印をつけた。,She is marking the important pages now.,彼女は今、重要なページに印をつけているところだ。,Had the boundary already been marked before construction began?,建設が始まる前にすでにその境界は印がつけられていましたか。
35,challenge,/ˈtʃælɪndʒ/,名詞・動詞,挑戦・課題・挑む,face a challenge 「課題に直面する」,Learning a new language is a great challenge.,新しい言語を学ぶことは大きな挑戦だ。,She is challenging several assumptions this week.,彼女は今週、いくつかの前提に異議を唱えているところだ。,Is this task a real challenge for you?,この課題はあなたにとって本当の挑戦ですか。
36,depend,/dɪˈpend/,動詞,頼る・〜次第である,depend on … 「〜に頼る・〜次第だ」,It depends on the weather whether we go out.,外出するかどうかは天気次第だ。,Success is depending on several factors this year.,成功は今年、いくつかの要因に左右されつつある。,Had the outcome already depended on the vote before the debate ended?,その討論が終わる前にすでにその結果は投票にかかっていましたか。
37,object,/əbˈdʒekt/,動詞・名詞,反対する・物,,Several residents objected to the new plan.,何人かの住民がその新しい計画に反対した。,She is objecting to several parts of the plan.,彼女はその計画のいくつかの部分に反対しているところだ。,Is this object made of wood or metal?,この物体は木でできていますか、それとも金属でできていますか。
38,demand,/dɪˈmænd/,動詞・名詞,要求する・需要,demand to do / demand that …,The workers demanded higher wages.,労働者たちはより高い賃金を要求した。,Workers are demanding higher wages.,労働者はより高い賃金を要求している。,There is high demand for electric cars.,電気自動車には高い需要がある。

165,medicine,/ˈmedɪsn/,名詞,薬・医学,,Take this medicine after every meal.,毎食後にこの薬を飲んでください。,She takes several medicines for her allergies.,彼女はアレルギーのためにいくつかの薬を服用している。,Is there any medicine for a headache?,頭痛用の薬はありますか。

167,feature,/ˈfiːtʃər/,名詞・動詞,特徴・特集する,a key feature 「主要な特徴」,The main feature of this phone is its camera.,このスマートフォンの主な特徴はカメラだ。,The new phone has several impressive features.,その新しい電話にはいくつかの印象的な機能がある。,What feature do you like most about this app?,このアプリで最も気に入っている機能は何ですか。

175,structure,/ˈstrʌktʃər/,名詞・動詞,構造・構成する,the structure of … 「〜の構造」,The structure of the essay needs improvement.,エッセイの構造は改善が必要だ。,She has good study habits.,彼女は良い勉強習慣を持っている。,What habit would you like to change?,どんな習慣を変えたいですか。
176,habit,/ˈhæbɪt/,名詞,習慣,form a habit 「習慣を形成する」,It is important to form good habits early.,早い段階で良い習慣を形成することが重要だ。,The website provides links to related articles.,そのウェブサイトは関連記事へのリンクを提供している。,Could you send me the link to the page?,そのページへのリンクを送っていただけますか。

183,mental,/ˈmentl/,形容詞,精神の,,Mental health is just as important as physical health.,精神的な健康は身体的な健康と同じくらい重要だ。,Mental exercises can help improve memory.,精神的な運動は記憶力の向上に役立つことがある。,Is mental health taken seriously at your workplace?,あなたの職場では心の健康は真剣に扱われていますか。

187,official,/əˈfɪʃl/,形容詞・名詞,公式の・役員,,This is the official announcement from the company.,これは会社からの公式発表だ。,Several officials attended the meeting.,何人かの役人がその会議に出席した。,Is this the official version of the report?,これはその報告書の公式版ですか。
188,financial,/faɪˈnænʃl/,形容詞,財政上の・金融の,financial support 「財政的支援」,She received financial support from her family.,彼女は家族から財政的支援を受けた。,The company faced several financial difficulties.,その会社はいくつかの財政的困難に直面した。,What is your financial situation like right now?,現在のあなたの財政状況はどのようなものですか。

193,active,/ˈæktɪv/,形容詞,活動的な,,He stays active by playing tennis every weekend.,彼は毎週末テニスをすることで活動的でいる。,She stays active by cycling every day.,彼女は毎日自転車に乗ることで活動的でいる。,Are you an active member of the club?,あなたはそのクラブの活発なメンバーですか。
194,digital,/ˈdɪdʒɪtl/,形容詞,デジタルの,,We store our photos in digital form now.,私たちは今では写真をデジタル形式で保存している。,Many schools now use digital textbooks.,多くの学校が今ではデジタル教科書を使っている。,Do you prefer digital or paper books?,デジタルの本と紙の本、どちらが好きですか。
195,mobile,/ˈmoʊbaɪl/,形容詞・名詞,移動式の・携帯電話,,She checked her mobile phone during the break.,彼女は休憩中に携帯電話を確認した。,She checked several mobile apps for the trip.,彼女は旅行のためにいくつかのモバイルアプリを確認した。,Do you have a mobile version of this website?,このウェブサイトのモバイル版はありますか。
196,novel,/ˈnɑːvl/,形容詞・名詞,斬新な・小説,,This is a novel approach to solving the problem.,これはその問題を解決する斬新な方法だ。,The company introduced several novel products this year.,その会社は今年、いくつかの斬新な製品を発表した。,"Is this approach truly novel, or has it been tried before?",このアプローチは本当に新しいのですか、それとも以前に試されたことがありますか。
197,plastic,/ˈplæstɪk/,名詞・形容詞,プラスチック・柔軟な,,We should reduce our use of plastic bags.,私たちはビニール袋の使用を減らすべきだ。,The factory produces several types of plastic.,その工場はいくつかの種類のプラスチックを生産している。,Is this container made of plastic or glass?,この容器はプラスチック製ですか、それともガラス製ですか。
198,chemical,/ˈkemɪkl/,形容詞・名詞,化学の・化学物質,,The factory produces various chemical products.,その工場は様々な化学製品を生産している。,The lab handles several hazardous chemicals.,その研究室はいくつかの危険な化学物質を扱っている。,Is this cleaning product chemical-free?,この洗浄剤は化学物質を含んでいませんか。

201,identify,/aɪˈdentɪfaɪ/,動詞,特定する・識別する,identify a problem 「問題を特定する」,We need to identify the cause of the issue.,問題の原因を特定する必要がある。,She is identifying the key issues in the report.,彼女は報告書の重要な問題点を特定しているところだ。,The suspect had already been identified by witnesses.,容疑者はすでに目撃者によって特定されていた。

203,indicate,/ˈɪndɪkeɪt/,動詞,示す・指し示す,indicate that … 「〜を示す」,The data indicates a rise in temperatures.,データは気温の上昇を示している。,The data is indicating a rise in demand.,そのデータは需要の増加を示している。,The results had already indicated a clear trend.,その結果はすでに明確な傾向を示していた。

205,attend,/əˈtend/,動詞,出席する・参加する,attend a meeting 「会議に出席する」,She attended the conference in Tokyo.,彼女は東京でのカンファレンスに出席した。,He is attending a conference this week.,彼は今週、会議に出席しているところだ。,She had attended the same school as her mother.,彼女は母親と同じ学校に通っていた。

207,survey,/ˈsɜːrveɪ/,動詞・名詞,調査する・見渡す・調査,conduct a survey 「調査を行う」,"The company surveyed 1,000 customers.","その会社は1,000人の顧客を調査した。",Researchers are surveying local residents about the plan.,研究者たちはその計画について地元住民を調査しているところだ。,A similar survey had been conducted five years earlier.,同様の調査が5年前にも実施されていた。
208,replace,/rɪˈpleɪs/,動詞,取り替える・代わりになる,replace A with B 「AをBに取り替える」,He replaced the old computer with a new one.,彼は古いコンピューターを新しいものに取り替えた。,The company is replacing old machines with new ones.,その会社は古い機械を新しいものに交換しているところだ。,The broken part had already been replaced.,その壊れた部品はすでに交換されていた。
209,sort,/sɔːrt/,名詞・動詞,種類・分類する,,What sort of music do you like?,どんな種類の音楽が好きですか。,She is sorting the papers by date.,彼女は書類を日付順に分類しているところだ。,The mail had been sorted before it was delivered.,その郵便物は配達される前に仕分けされていた。
210,conduct,/kənˈdʌkt/,動詞・名詞,行う・行動,conduct research 「研究を行う」,The professor conducted a study on learning habits.,教授は学習習慣に関する研究を行った。,The team is conducting an experiment in the lab.,そのチームは研究室で実験を行っているところだ。,A thorough investigation had been conducted before the trial.,裁判の前に徹底的な調査が行われていた。

212,attempt,/əˈtempt/,名詞・動詞,試み・試みる,make an attempt to do 「〜しようと試みる」,He made an attempt to climb the mountain.,彼は山に登ろうと試みた。,She is attempting to fix the problem herself.,彼女は自分でその問題を解決しようとしているところだ。,A rescue had been attempted earlier that day.,その日の早い時間に救助が試みられていた。
213,promote,/prəˈmoʊt/,動詞,促進する・昇進させる,promote health 「健康を促進する」,Exercise promotes both physical and mental health.,運動は身体的・精神的健康を促進する。,The company is promoting a new product line.,その会社は新しい製品ラインを宣伝しているところだ。,She had been promoted to manager the year before.,彼女は前年にマネージャーに昇進していた。
214,earn,/ɜːrn/,動詞,稼ぐ,,She earns a good salary as an engineer.,彼女はエンジニアとして良い給料を稼いでいる。,She is earning extra money on weekends.,彼女は週末に副収入を得ているところだ。,He had earned enough to buy a car by then.,彼はその頃までに車を買えるだけのお金を稼いでいた。
215,unite,/juˈnaɪt/,動詞,団結する・結合する,,The community united to help the flood victims.,地域社会は洪水被害者を助けるために団結した。,Volunteers are uniting to help flood victims.,ボランティアたちは洪水被害者を助けるために団結しているところだ。,The two parties had finally been united after years of conflict.,その2つの政党は何年もの対立の末、ついに統一されていた。
216,feed,/fiːd/,動詞,餌を与える・養う,,She feeds her cat twice a day.,彼女は1日2回猫に餌を与える。,She is feeding the baby right now.,彼女は今、赤ちゃんに食事を与えているところだ。,The animals had already been fed before we arrived.,私たちが着く前に動物たちはすでに餌を与えられていた。

220,estimate,/ˈestɪmeɪt/,動詞・名詞,見積もる・見積もり,,We estimate the project will take three months.,私たちはそのプロジェクトが3ヶ月かかると見積もっている。,Analysts are estimating a small increase in sales.,アナリストたちは売上のわずかな増加を見積もっているところだ。,The cost had been estimated at ten thousand dollars.,その費用は1万ドルと見積もられていた。

225,match,/mætʃ/,動詞・名詞,一致する・試合,,Your answer doesn't match mine.,あなたの答えは私の答えと一致しない。,The system is matching candidates with suitable jobs.,そのシステムは候補者と適した仕事を照合しているところだ。,Her fingerprints had already been matched to the scene.,彼女の指紋はすでに現場のものと一致していた。

250,section,/ˈsekʃn/,名詞,部門・区域,,Please turn to the next section of the report.,報告書の次のセクションに進んでください。,The report has several sections to review.,その報告書には確認すべきいくつかのセクションがある。,Which section should we discuss first?,どのセクションから話し合うべきですか。
251,audience,/ˈɔːdiəns/,名詞,聴衆,,The audience applauded at the end of the show.,ショーの終わりに観客は拍手した。,Several audiences responded positively to the film.,いくつかの観客がその映画に好意的に反応した。,Was the audience mostly young people?,観客は主に若い人たちでしたか。
252,surface,/ˈsɜːrfɪs/,名詞,表面,,The surface of the lake was completely still.,湖の表面は完全に静かだった。,There are small scratches on the surface.,表面にはいくつかの小さな傷がある。,Is the surface completely dry now?,表面はもう完全に乾いていますか。

276,track,/træk/,名詞・動詞,跡・線路・追跡する,,We could track the package online.,私たちはオンラインで荷物を追跡できた。,There are several tracks on the new album.,その新しいアルバムにはいくつかのトラックがある。,Which track is your favorite on the album?,そのアルバムであなたの一番好きなトラックはどれですか。
277,revolution,/ˌrevəˈluːʃn/,名詞,革命・大変革,a technological revolution 「技術革命」,The internet caused a technological revolution.,インターネットは技術革命を引き起こした。,There have been several revolutions in this country's history.,この国の歴史にはいくつかの革命があった。,Did the revolution change the government completely?,その革命は政府を完全に変えましたか。
278,progress,/ˈprəʊɡres/,名詞・動詞,進歩・前進する,make progress 「進歩する」,She has made great progress in her studies.,彼女は勉強において大きな進歩を遂げた。,The team is making progress on several fronts.,そのチームはいくつかの面で進展を見せている。,Has there been any progress on the report?,その報告書について何か進展はありましたか。
279,cognitive,/ˈkɑːɡnətɪv/,形容詞,認知の,,This game helps improve cognitive skills.,このゲームは認知能力の向上に役立つ。,Several cognitive skills develop during childhood.,いくつかの認知能力は子供時代に発達する。,Is this test measuring cognitive ability?,このテストは認知能力を測定していますか。
280,ideal,/aɪˈdiːəl/,形容詞,理想的な,be ideal for … 「〜に理想的だ」,This location is ideal for a new office.,この場所は新しいオフィスに理想的だ。,She has several ideal conditions for the experiment.,彼女はその実験のためにいくつかの理想的な条件を持っている。,Is this the ideal time to launch the product?,これはその製品を発売する理想的な時期ですか。
281,efficient,/ɪˈfɪʃnt/,形容詞,効率的な,an efficient system 「効率的なシステム」,We need a more efficient way to manage resources.,資源を管理するためのより効率的な方法が必要だ。,The team found several efficient solutions.,そのチームはいくつかの効率的な解決策を見つけた。,Is this the most efficient way to do it?,これがそれを行う最も効率的な方法ですか。
282,universal,/ˌjuːnɪˈvɜːrsl/,形容詞,普遍的な,universal values 「普遍的な価値観」,Universal values unite people across cultures.,普遍的な価値観が文化を超えて人々を結びつける。,Several universal values are shared across cultures.,いくつかの普遍的な価値観は文化を超えて共有されている。,Is honesty a universal virtue?,正直さは普遍的な美徳ですか。
283,vast,/væst/,形容詞,広大な,,The desert stretches over a vast area.,その砂漠は広大な地域に広がっている。,There are vast differences between the two plans.,その2つの計画には大きな違いがある。,Is the desert really that vast?,その砂漠は本当にそんなに広大なのですか。
284,extra,/ˈekstrə/,形容詞・名詞,余分の・追加,,We need to bring extra water for the hike.,ハイキングのために余分な水を持ってくる必要がある。,She packed several extra items for the trip.,彼女は旅行のためにいくつかの余分な品を詰めた。,Do we need any extra supplies for the trip?,旅行に何か追加の物資は必要ですか。
285,entire,/ɪnˈtaɪər/,形容詞,全体の,,She read the entire book in one day.,彼女はその本を1日で全部読んだ。,She read the entire book in two days.,彼女はその本全体を2日で読んだ。,Did you watch the entire movie?,その映画全体を見ましたか。
286,familiar,/fəˈmɪliər/,形容詞,よく知っている・親しみやすい,be familiar with … 「〜をよく知っている」,Are you familiar with this software?,このソフトウェアをご存知ですか？,Several familiar faces appeared at the reunion.,その同窓会にはいくつかの見覚えのある顔が現れた。,Are you familiar with this software?,このソフトウェアに慣れていますか。
287,obvious,/ˈɒbviəs/,形容詞,明らかな・明白な,It is obvious that … 「〜は明らかだ」,It is obvious that he made a mistake.,彼がミスをしたのは明らかだ。,There were several obvious mistakes in the report.,その報告書にはいくつかの明白な間違いがあった。,Isn't it obvious that we need more time?,もっと時間が必要なのは明らかではありませんか。
288,moral,/ˈmɔːrəl/,形容詞・名詞,道徳の・教訓,,The story has an important moral lesson.,その物語には重要な教訓がある。,The story teaches several moral lessons.,その物語はいくつかの道徳的な教訓を教えている。,Is this a moral or a practical issue?,これは道徳的な問題ですか、それとも実際的な問題ですか。
289,ordinary,/ˈɔːrdəneri/,形容詞,普通の,,It was just an ordinary day at work.,それは仕事のただの普通の一日だった。,It was just an ordinary day with a few small surprises.,それはいくつかの小さな驚きのあるただの普通の日だった。,"Is this an ordinary occurrence, or something unusual?",これは普通に起こることですか、それとも何か珍しいことですか。
290,equal,/ˈiːkwəl/,形容詞,等しい・平等な,be equal to … 「〜と等しい」,All people are equal under the law.,法の下ではすべての人が平等だ。,Both teams had equal chances of winning.,両チームには勝利の同等のチャンスがあった。,Are the two portions roughly equal?,その2つの部分はほぼ等しいですか。
291,previous,/ˈpriːviəs/,形容詞,以前の,,This is much better than the previous version.,これは以前のバージョンよりずっと良い。,There are several previous versions of this document.,この文書にはいくつかの以前のバージョンがある。,Was the previous manager better than this one?,以前のマネージャーはこの人より良かったですか。
292,false,/fɔːls/,形容詞,誤った・偽の,,The rumor turned out to be false.,そのうわさは誤りだと判明した。,Several statements in the report turned out to be false.,その報告書のいくつかの記述は誤りだと判明した。,Is this claim true or false?,この主張は本当ですか、それとも誤りですか。
293,rare,/reər/,形容詞,まれな,,It's rare to see snow in this city.,この街で雪を見るのは珍しい。,There are several rare species in this forest.,この森にはいくつかの珍しい種がいる。,Is this stamp really that rare?,この切手は本当にそんなに珍しいのですか。
294,legal,/ˈliːɡl/,形容詞,法律の,,She sought legal advice about the contract.,彼女はその契約について法的助言を求めた。,The company follows several legal requirements.,その会社はいくつかの法的要件に従っている。,Is this practice legal in your country?,この慣行はあなたの国では合法ですか。
295,independent,/ˌɪndɪˈpendənt/,形容詞,独立した・自立した,be independent of … 「〜から独立している」,She became financially independent at 25.,彼女は25歳で経済的に自立した。,Several independent studies confirmed the results.,いくつかの独立した研究がその結果を確認した。,Is this country politically independent?,この国は政治的に独立していますか。
296,extreme,/ɪkˈstriːm/,形容詞,極端な・過激な,extreme weather 「極端な天気」,Extreme weather events are becoming more frequent.,極端な気象現象がより頻繁に起きるようになっている。,There were several extreme weather events this year.,今年はいくつかの極端な気象現象があった。,"Is this an extreme case, or fairly common?",これは極端なケースですか、それともかなり一般的ですか。
297,actual,/ˈæktʃuəl/,形容詞,実際の,,The actual cost was higher than expected.,実際の費用は予想より高かった。,There are several actual costs not shown here.,ここには示されていないいくつかの実際の費用がある。,What was the actual result of the experiment?,その実験の実際の結果は何でしたか。
298,willing,/ˈwɪlɪŋ/,形容詞,進んで〜する,be willing to do 「進んで〜する」,She is willing to help others in need.,彼女は困っている人を進んで助ける。,Several employees are willing to work overtime.,何人かの従業員は残業する意思がある。,Are you willing to travel for this job?,この仕事のために出張する意思はありますか。
299,urban,/ˈɜːrbən/,形容詞,都市の,,Urban areas tend to have more traffic.,都市部は交通量が多い傾向がある。,Several urban areas face similar traffic problems.,いくつかの都市部は同様の交通問題に直面している。,Is this considered an urban or rural area?,ここは都市部と見なされていますか、それとも田舎ですか。
300,whereas,/wɛərˈæz/,接続詞,一方で,,"She loves coffee, whereas he prefers tea.",彼女はコーヒーが好きだが、一方彼は紅茶を好む。,"Several plans failed, whereas this one succeeded.",いくつかの計画が失敗した一方で、この計画は成功した。,"Do you prefer tea, whereas your sister prefers coffee?",あなたは紅茶が好きなのに対して、あなたの妹はコーヒーが好きですか。
301,predict,/prɪˈdɪkt/,動詞,予測する,predict that … 「〜と予測する」,Scientists predict that temperatures will rise.,科学者たちは気温が上昇すると予測する。,Experts are predicting heavy rain tomorrow.,専門家たちは明日、大雨を予測しているところだ。,The outcome had already been predicted by analysts.,その結果はすでにアナリストたちによって予測されていた。
302,examine,/ɪɡˈzæmɪn/,動詞,調べる・検査する,examine O carefully 「Oを注意深く調べる」,The doctor examined the patient carefully.,医師は患者を注意深く診察した。,Doctors are examining the patient carefully.,医師たちはその患者を注意深く診察しているところだ。,The evidence had been examined by two experts.,その証拠は2人の専門家によって検討されていた。
303,trust,/trʌst/,名詞・動詞,信頼・信頼する,build trust 「信頼を築く」,It takes time to build trust with others.,他者との信頼を築くには時間がかかる。,She is trusting her instincts on this decision.,彼女はこの決定に関して自分の直感を信じているところだ。,He had trusted her completely before the incident.,彼はその出来事の前、彼女を完全に信頼していた。
304,stick,/stɪk/,動詞・名詞,突き刺す・棒,,The label wouldn't stick to the box.,そのラベルは箱にくっつかなかった。,The label is sticking to the box firmly.,そのラベルは箱にしっかりとくっついている。,The note had been stuck on the door all day.,そのメモは一日中ドアに貼られていた。
305,emerge,/ɪˈmɜːrdʒ/,動詞,出てくる・明らかになる,emerge as … 「〜として台頭する」,A new leader emerged from the group.,グループから新しいリーダーが台頭した。,New evidence is emerging in the investigation.,その調査で新しい証拠が浮上しつつある。,A clear pattern had emerged by the end of the study.,その研究の終わりまでに明確なパターンが現れていた。
306,vary,/ˈvɛəri/,動詞,異なる,,Prices vary depending on the season.,価格は季節によって異なる。,Prices are varying widely between stores.,価格は店によって大きく異なっている。,Results had varied greatly across different regions.,結果は地域によって大きく異なっていた。
307,release,/rɪˈliːs/,動詞・名詞,解放する・公開,,The band will release a new album next month.,そのバンドは来月新しいアルバムを発売する。,The company is releasing a new update this week.,その会社は今週、新しいアップデートを公開しているところだ。,The film had been released two years earlier.,その映画は2年前に公開されていた。
308,divide,/dɪˈvaɪd/,動詞,分ける,,The teacher divided the class into groups.,先生はクラスをグループに分けた。,The teacher is dividing the class into groups.,先生はクラスをグループに分けているところだ。,The land had been divided among the heirs.,その土地は相続人たちの間で分割されていた。
309,enable,/ɪˈneɪbl/,動詞,可能にする・できるようにする,enable O to do 「Oが〜できるようにする」,Technology enables us to communicate instantly.,テクノロジーは私たちが即座にコミュニケーションできるようにする。,This tool is enabling faster communication.,このツールはより速いコミュニケーションを可能にしている。,New technology had enabled remote work long before the pandemic.,新しい技術はパンデミックのずっと前からリモートワークを可能にしていた。
310,judge,/dʒʌdʒ/,動詞・名詞,判断する・裁判官,,Don't judge people by their appearance.,人を見た目で判断してはいけない。,The panel is judging the contest entries now.,審査団は今、コンテストの応募作品を審査しているところだ。,The case had already been judged by the time we arrived.,私たちが着く頃には、その事件はすでに判断されていた。
311,rely,/rɪˈlaɪ/,動詞,頼る・信頼する,rely on … 「〜に頼る」,You can rely on her to get the job done.,仕事を終わらせることは彼女に頼れます。,She is relying on public transport this week.,彼女は今週、公共交通機関に頼っているところだ。,The team had relied heavily on one key player.,そのチームは一人の主力選手に大きく頼っていた。
312,engage,/ɪnˈɡeɪdʒ/,動詞,従事する・引き込む,,Students actively engaged in the discussion.,生徒たちは積極的に議論に参加した。,Students are engaging actively in the discussion.,生徒たちは積極的に議論に参加しているところだ。,The community had been engaged in the project from the start.,その地域社会は最初からそのプロジェクトに関わっていた。
313,shift,/ʃɪft/,動詞・名詞,移る・変化させる,shift focus 「焦点を変える」,The company shifted its focus to online sales.,会社はオンライン販売に焦点を移した。,Public opinion is shifting toward renewable energy.,世論は再生可能エネルギーへと傾きつつある。,The deadline had already been shifted twice.,その締め切りはすでに2回変更されていた。
314,adopt,/əˈdɒpt/,動詞,採用する・養子にする,adopt a policy 「政策を採用する」,They adopted a new approach to teaching.,彼らは新しい教授法を採用した。,The school is adopting a new curriculum this year.,その学校は今年、新しいカリキュラムを採用しているところだ。,The policy had been adopted by several other countries.,その政策はいくつかの他の国々でも採用されていた。
315,acquire,/əˈkwaɪər/,動詞,習得する・取得する,acquire knowledge 「知識を習得する」,She acquired extensive knowledge through self-study.,彼女は独学で広範な知識を習得した。,The company is acquiring a smaller startup.,その会社は小さなスタートアップを買収しているところだ。,She had acquired fluent Spanish by living in Chile.,彼女はチリに住むことで流暢なスペイン語を習得していた。
316,expand,/ɪkˈspænd/,動詞,拡大する・広げる,expand into … 「〜に拡大する」,The company expanded into the Asian market.,その会社はアジア市場に拡大した。,The business is expanding into new markets.,その事業は新しい市場に拡大しているところだ。,The company had expanded rapidly before the recession.,その会社は不況の前に急速に拡大していた。
317,refuse,/rɪˈfjuːz/,動詞,断る・拒否する,refuse to do 「〜することを拒否する」,He refused to sign the contract.,彼は契約書に署名することを拒否した。,She is refusing to sign the contract.,彼女はその契約書に署名することを拒否しているところだ。,The request had already been refused once before.,その要望は以前にも一度拒否されていた。
318,strike,/straɪk/,動詞・名詞,打つ・ストライキ,,Lightning struck the old tree.,雷がその古い木に落ちた。,Workers are striking over pay this week.,労働者たちは今週、賃金をめぐってストライキを行っているところだ。,Lightning had struck the tower twice that summer.,その夏、雷はその塔に二度落ちていた。
319,repeat,/rɪˈpiːt/,動詞,繰り返す,,"Could you repeat that, please?",もう一度言っていただけますか。,She is repeating the instructions for clarity.,彼女は明確にするために説明を繰り返しているところだ。,The same mistake had been repeated several times.,同じ間違いが何度も繰り返されていた。
320,consume,/kənˈsuːm/,動詞,消費する,,We should consume less sugar.,私たちは砂糖の摂取を減らすべきだ。,Households are consuming more energy in winter.,家庭は冬により多くのエネルギーを消費している。,Far more resources had been consumed than expected.,予想よりもはるかに多くの資源が消費されていた。
321,confuse,/kənˈfjuːz/,動詞,混乱させる,,The instructions confused everyone.,その説明はみんなを混乱させた。,The instructions are confusing many new users.,その説明は多くの新規ユーザーを混乱させている。,Customers had been confused by the unclear signage.,客たちはその分かりにくい標識に混乱させられていた。
322,select,/sɪˈlekt/,動詞,選択する・選ぶ,select O from … 「〜からOを選ぶ」,She was selected from hundreds of applicants.,彼女は何百人もの応募者の中から選ばれた。,She is selecting candidates for the final round.,彼女は最終選考の候補者を選んでいるところだ。,The winner had already been selected before the ceremony.,その式典の前に勝者はすでに選ばれていた。
323,evolve,/ɪˈvɒlv/,動詞,進化する・発展する,evolve over time 「時間をかけて発展する」,Languages evolve over time to reflect cultural changes.,言語は文化的変化を反映して時間をかけて発展する。,The species is evolving to survive in the new climate.,その種は新しい気候で生き残るために進化しつつある。,The industry had evolved significantly over the past decade.,その業界は過去10年で大きく進化していた。
324,convince,/kənˈvɪns/,動詞,説得する・確信させる,convince O to do / convince O that …,She convinced him to change his decision.,彼女は彼に決断を変えるよう説得した。,She is convincing her boss to approve the plan.,彼女は上司にその計画を承認するよう説得しているところだ。,He had already been convinced before the meeting started.,会議が始まる前に彼はすでに説得されていた。
325,recall,/rɪˈkɔːl/,動詞,思い出す・呼び戻す,recall doing 「〜したことを思い出す」,I can't recall where I put my keys.,鍵をどこに置いたか思い出せない。,She is recalling details from her childhood.,彼女は子供時代の詳細を思い出しているところだ。,The company had recalled thousands of defective products.,その会社は数千個の欠陥製品を回収していた。
326,destroy,/dɪˈstrɔɪ/,動詞,破壊する,,The fire destroyed the entire building.,火事はその建物全体を破壊した。,The fire is destroying everything in its path.,その火事は進路にあるすべてを破壊しつつある。,The old bridge had been destroyed in the storm.,その古い橋はその嵐で破壊されていた。
327,preserve,/prɪˈzɜːrv/,動詞,保存する・守る,preserve the environment 「環境を守る」,We must act now to preserve the rainforest.,熱帯雨林を保護するために今行動しなければならない。,The team is preserving the forest from logging.,そのチームは伐採からその森を守っているところだ。,The building had been carefully preserved for over a century.,その建物は一世紀以上にわたって丁寧に保存されていた。
328,organize,/ˈɔːrɡənaɪz/,動詞,組織する・整理する,organize an event 「イベントを組織する」,She organized a charity event for the community.,彼女は地域のためにチャリティイベントを組織した。,She is organizing the files by category.,彼女は書類をカテゴリー別に整理しているところだ。,The event had been organized months in advance.,そのイベントは何ヶ月も前から準備されていた。
329,warn,/wɔːrn/,動詞,警告する,warn O to do / warn O that …,She warned him not to go out alone at night.,彼女は彼に夜一人で外出しないよう警告した。,The sign is warning drivers of the danger ahead.,その標識は運転手たちに前方の危険を警告している。,Residents had been warned before the storm arrived.,住民たちはその嵐が来る前に警告を受けていた。
330,address,/əˈdres/,動詞・名詞,取り組む・演説する・住所,address a problem 「問題に取り組む」,We need to address the issue immediately.,その問題に直ちに取り組む必要がある。,She is addressing the audience's concerns directly.,彼女は聴衆の懸念に直接応えているところだ。,The issue had already been addressed in the last meeting.,その問題は前回の会議ですでに取り上げられていた。
331,operate,/ˈɒpəreɪt/,動詞,運営する・操作する,operate a business 「ビジネスを運営する」,She has been operating her own business for years.,彼女は長年自分のビジネスを運営してきた。,The factory is operating twenty-four hours a day.,その工場は24時間体制で稼働している。,The machine had been operated safely for years.,その機械は何年も安全に操作されていた。
332,participate,/pɑːˈtɪsɪpeɪt/,動詞,参加する,participate in … 「〜に参加する」,All students are encouraged to participate in activities.,すべての生徒が活動への参加を奨励されている。,Students are participating in the science fair.,生徒たちは科学フェアに参加しているところだ。,Over a hundred people had participated in last year's event.,去年のイベントには100人以上が参加していた。
333,surround,/səˈraʊnd/,動詞,囲む,,Mountains surround the small village.,山々がその小さな村を囲んでいる。,Fans are surrounding the singer outside the venue.,ファンたちは会場の外でその歌手を取り囲んでいる。,The house had been surrounded by police before dawn.,その家は夜明け前に警察に包囲されていた。
334,flow,/floʊ/,動詞・名詞,流れる・流れ,,The river flows through the valley.,その川は谷を流れている。,The river is flowing swiftly after the rain.,その川は雨の後、勢いよく流れている。,Traffic had flowed smoothly until the accident.,その事故が起きるまで交通はスムーズに流れていた。
335,bore,/bɔːr/,動詞,退屈させる,,This lecture is starting to bore me.,この講義は私を退屈させ始めている。,This lecture is boring most of the students.,この講義はほとんどの生徒を退屈させている。,The long meeting had bored everyone by the end.,その長い会議は最後には全員を退屈させていた。
336,complain,/kəmˈpleɪn/,動詞,不平を言う,,Customers complained about the slow service.,客たちは遅いサービスについて不満を言った。,Customers are complaining about the slow delivery.,客たちは遅い配送について不満を言っているところだ。,Several guests had complained before the manager arrived.,マネージャーが来る前に何人かの客が苦情を言っていた。
337,host,/hoʊst/,名詞・動詞,主催者・主催する,,She will host the party this weekend.,彼女は今週末パーティーを主催する。,She is hosting a dinner party tonight.,彼女は今夜、ディナーパーティーを主催しているところだ。,The city had hosted the Olympics twice before.,その都市はそれまでに2度オリンピックを開催していた。

403,educate,/ˈedʒukeɪt/,動詞,教育する,,Schools aim to educate children about the environment.,学校は子供たちに環境について教育することを目指している。,The program is educating young people about finance.,そのプログラムは若者にお金について教育しているところだ。,She had been educated in three different countries.,彼女は3つの異なる国で教育を受けていた。
404,purchase,/ˈpɜːrtʃəs/,動詞・名詞,購入する・購入,,She purchased a new laptop yesterday.,彼女は昨日新しいノートパソコンを購入した。,She is purchasing a new laptop online.,彼女はオンラインで新しいノートパソコンを購入しているところだ。,The house had already been purchased before the price rose.,価格が上がる前に、その家はすでに購入されていた。

408,explore,/ɪkˈsplɔːr/,動詞,探求する・調査する,explore possibilities 「可能性を探求する」,She explored all possibilities before deciding.,彼女は決断する前にすべての可能性を探求した。,They are exploring the cave with flashlights.,彼らは懐中電灯を持ってその洞窟を探検しているところだ。,Several options had already been explored before this one.,この選択肢の前にすでにいくつかの選択肢が検討されていた。
409,amaze,/əˈmeɪz/,動詞,驚かせる,,Her talent amazed everyone in the room.,彼女の才能はその場の全員を驚かせた。,Her talent is amazing everyone at the show.,彼女の才能はそのショーで皆を驚かせている。,The audience had been amazed by the magician's tricks.,観客はその手品師のトリックに驚かされていた。

414,advertise,/ˈædvərtaɪz/,動詞,宣伝する,,The company advertises its products online.,その会社はオンラインで製品を宣伝している。,The company is advertising its products on social media.,その会社はソーシャルメディアで製品を宣伝しているところだ。,The sale had already been advertised widely.,そのセールはすでに広く宣伝されていた。
415,encounter,/ɪnˈkaʊntər/,名詞・動詞,出会い・遭遇する,encounter difficulty 「困難に遭遇する」,She encountered many challenges in her career.,彼女はキャリアで多くの課題に遭遇した。,She is encountering some difficulties with the new system.,彼女は新しいシステムでいくつかの困難に直面しているところだ。,They had encountered similar issues before.,彼らは以前にも同様の問題に直面していた。
416,remind,/rɪˈmaɪnd/,動詞,思い出させる,,This song reminds me of my childhood.,この歌は私に子供時代を思い出させる。,This song is reminding her of her college days.,この歌は彼女に大学時代を思い出させている。,She had been reminded twice before she finally remembered.,彼女はついに思い出す前に二度念押しされていた。
417,locate,/loʊˈkeɪt/,動詞,位置する,,The office is located near the station.,その事務所は駅の近くに位置している。,The app is locating the nearest coffee shop.,そのアプリは最寄りのコーヒーショップを探しているところだ。,The office had been relocated to a new building.,そのオフィスは新しい建物に移転していた。
418,aid,/eɪd/,動詞・名詞,助ける・援助,aid O in doing 「Oが〜するのを助ける」,The new technology aids doctors in diagnosis.,新技術は医師が診断するのを助ける。,Volunteers are aiding the flood victims this week.,ボランティアたちは今週、洪水被害者を支援しているところだ。,International aid had been sent before the crisis worsened.,その危機が悪化する前に国際援助が送られていた。

444,neighborhood,/ˈneɪbərhʊd/,名詞,近所,,We live in a quiet neighborhood.,私たちは静かな近所に住んでいる。,She lives in one of the safest neighborhoods.,彼女は最も安全な地区の一つに住んでいる。,Is your neighborhood quiet at night?,あなたの近所は夜、静かですか。

583,anxious,/ˈæŋkʃəs/,形容詞,不安な・熱望している,be anxious about … / be anxious to do,She is anxious about the exam results.,彼女は試験結果について不安だ。,Several anxious students waited outside the exam room.,何人かの不安な生徒たちが試験会場の外で待っていた。,Are you anxious about the interview tomorrow?,明日の面接について不安ですか。
584,vital,/ˈvaɪtl/,形容詞,不可欠な,,Sleep is vital for good health.,睡眠は健康にとって不可欠だ。,Several factors are vital to the success of this plan.,いくつかの要因がこの計画の成功に不可欠だ。,Is sleep really that vital for health?,睡眠は本当にそれほど健康に不可欠なのですか。
585,conventional,/kənˈvenʃənl/,形容詞,従来の・慣習的な,conventional methods 「従来の方法」,She challenged conventional ideas about education.,彼女は教育についての従来の考えに異議を唱えた。,Several conventional methods were replaced by new ones.,いくつかの従来の方法が新しいものに取って代わられた。,Is this a conventional or an unusual approach?,これは従来のアプローチですか、それとも珍しいアプローチですか。
586,abstract,/ˈæbstrækt/,形容詞・名詞,抽象的な・要旨,abstract thinking 「抽象的思考」,Abstract thinking is important in mathematics.,抽象的思考は数学において重要だ。,She discussed several abstract concepts in her thesis.,彼女は自分の論文でいくつかの抽象的な概念を論じた。,Is this idea too abstract for beginners?,この考えは初心者には抽象的すぎますか。
587,minor,/ˈmaɪnər/,形容詞・名詞,小さな・未成年者,,It was only a minor problem.,それはほんの小さな問題だった。,There were several minor issues with the design.,そのデザインにはいくつかの小さな問題があった。,Is this a minor or a major repair?,これは小さな修理ですか、それとも大きな修理ですか。
588,extraordinary,/ɪkˈstrɔːrdəneri/,形容詞,並外れた,,She showed extraordinary courage during the crisis.,彼女は危機の間、並外れた勇気を示した。,She showed extraordinary courage in several situations.,彼女はいくつかの状況で並外れた勇気を示した。,Was the performance truly extraordinary?,その演技は本当に並外れたものでしたか。
589,stable,/ˈsteɪbl/,形容詞,安定した,a stable income 「安定した収入」,She has a stable income from her business.,彼女はビジネスから安定した収入を得ている。,Several markets remained stable despite the crisis.,いくつかの市場はその危機にもかかわらず安定を保った。,Is the current job market stable?,現在の求人市場は安定していますか。
590,flexible,/ˈfleksɪbl/,形容詞,柔軟な・融通がきく,a flexible schedule 「柔軟なスケジュール」,This job offers a flexible working schedule.,この仕事は柔軟な勤務スケジュールを提供する。,The company offers several flexible working options.,その会社はいくつかの柔軟な働き方の選択肢を提供している。,Is your schedule flexible enough for this project?,あなたのスケジュールはこのプロジェクトに十分柔軟ですか。
591,brief,/briːf/,形容詞・動詞,短い・要点を伝える,,She gave a brief summary of the meeting.,彼女は会議の簡潔な要約をした。,She gave several brief summaries during the meeting.,彼女はその会議中にいくつかの簡潔な要約をした。,Was the speech brief or long?,そのスピーチは短かったですか、それとも長かったですか。
592,aggressive,/əˈɡresɪv/,形容詞,攻撃的な・積極的な,an aggressive approach 「積極的なアプローチ」,She took an aggressive approach to negotiations.,彼女は交渉に積極的なアプローチを取った。,The dog showed several aggressive behaviors toward strangers.,その犬は見知らぬ人に対していくつかの攻撃的な行動を示した。,Is this competitor known for aggressive pricing?,この競合他社は積極的な価格設定で知られていますか。
593,visible,/ˈvɪzəbl/,形容詞,目に見える,,The mountain was clearly visible from the hotel.,その山はホテルからはっきりと見えた。,Several stars were visible in the clear sky.,晴れた空にはいくつかの星が見えた。,Is the mountain visible from your window?,その山はあなたの窓から見えますか。
594,unexpected,/ˌʌnɪkˈspektɪd/,形容詞,予期しない,,We received an unexpected visit from her.,私たちは彼女から予期しない訪問を受けた。,There were several unexpected results in the study.,その研究にはいくつかの予期しない結果があった。,Was this an unexpected outcome for the team?,これはそのチームにとって予期しない結果でしたか。
595,ethnic,/ˈeθnɪk/,形容詞,民族の,,The festival celebrates ethnic diversity.,その祭りは民族の多様性を祝う。,The festival celebrates several ethnic traditions.,その祭りはいくつかの民族の伝統を祝う。,Is this dish part of an ethnic tradition?,この料理はある民族の伝統の一部ですか。
596,alien,/ˈeɪliən/,形容詞・名詞,異質な・宇宙人,,The customs felt alien to the visitors.,その習慣は訪問者にとって異質に感じられた。,The customs felt alien to several visitors.,その習慣は何人かの訪問者にとって異質に感じられた。,Do you believe alien life exists somewhere in the universe?,あなたは宇宙のどこかに地球外生命体が存在すると信じますか。
597,initial,/ɪˈnɪʃl/,形容詞・名詞,最初の・頭文字,,Her initial reaction was surprise.,彼女の最初の反応は驚きだった。,She made several initial mistakes before improving.,彼女は上達する前にいくつかの最初の間違いをした。,Is this your initial reaction to the plan?,これはその計画に対するあなたの最初の反応ですか。
598,exact,/ɪɡˈzækt/,形容詞,正確な・厳密な,to be exact 「正確に言えば」,I need the exact address of the building.,建物の正確な住所が必要です。,Please provide several exact measurements.,いくつかの正確な測定値を提供してください。,Is this the exact time the meeting starts?,これは会議が始まる正確な時間ですか。
599,precise,/prɪˈsaɪs/,形容詞,正確な・厳密な,a precise answer 「正確な答え」,She gave a precise answer to each question.,彼女は各質問に正確な答えを出した。,She gave several precise instructions to the team.,彼女はチームにいくつかの正確な指示を出した。,Is this measurement precise enough for the experiment?,この測定はその実験に十分正確ですか。
600,latter,/ˈlætər/,形容詞・名詞,後者の・後者,,"Of the two options, I prefer the latter.",2つの選択肢のうち、私は後者を好む。,"Of the two options, she chose the latter for several reasons.",その2つの選択肢のうち、彼女はいくつかの理由で後者を選んだ。,Do you prefer the former plan or the latter one?,前者の計画と後者の計画、どちらを好みますか。
601,commit,/kəˈmɪt/,動詞,commit to doing 「〜することを約束する」 犯す・委ねる,commit a crime 「犯罪を犯す」,He was committed to improving his community.,彼はコミュニティの改善に取り組んでいた。,She is committing to a healthier lifestyle this year.,彼女は今年、より健康的な生活習慣に取り組んでいるところだ。,He had already committed to the project before the deadline.,彼はその締め切りの前にすでにそのプロジェクトに関わることを決めていた。
602,stimulate,/ˈstɪmjuleɪt/,動詞,刺激する・促進する,stimulate growth 「成長を刺激する」,Reading stimulates the imagination.,読書は想像力を刺激する。,The new policy is stimulating local business growth.,その新しい政策は地元企業の成長を刺激している。,The economy had been stimulated by tax cuts.,経済は減税によって刺激されていた。
603,enhance,/ɪnˈhɑːns/,動詞,高める・増大させる,enhance performance 「パフォーマンスを高める」,Regular practice enhances musical performance.,定期的な練習が音楽的パフォーマンスを高める。,The new feature is enhancing the app's performance.,その新機能はそのアプリの性能を向上させている。,The photo had already been enhanced before printing.,その写真は印刷前にすでに加工されていた。
604,pursue,/pəˈsjuː/,動詞,追求する・続ける,pursue a goal 「目標を追求する」,He decided to pursue his dream of becoming an artist.,彼は芸術家になるという夢を追求することにした。,She is pursuing a career in medicine.,彼女は医学の道を追求しているところだ。,He had pursued the same dream for years.,彼は何年も同じ夢を追い続けていた。
605,react,/riˈækt/,動詞,反応する,,How did she react to the news?,彼女はその知らせにどう反応しましたか。,She is reacting calmly to the bad news.,彼女はその悪い知らせに冷静に反応しているところだ。,The market had already reacted before the announcement.,その発表の前にすでに市場は反応していた。
606,disagree,/ˌdɪsəˈɡriː/,動詞,意見が合わない・反対する,disagree with … 「〜に反対する」,I disagree with his opinion on this matter.,この件について彼の意見に反対です。,They are disagreeing about the budget again.,彼らはまた予算について意見が対立しているところだ。,The two committees had disagreed for months before compromising.,その2つの委員会は妥協するまで何ヶ月も意見が対立していた。
607,stare,/stɛər/,動詞,じっと見る,,He stared at the painting for a long time.,彼は長い間その絵をじっと見つめた。,He is staring out the window in silence.,彼は静かに窓の外を見つめているところだ。,She had stared at the letter for a long time before opening it.,彼女は開ける前にその手紙を長い間見つめていた。
608,abandon,/əˈbændən/,動詞,捨てる・放棄する,abandon a plan 「計画を放棄する」,They had to abandon the project due to lack of funds.,資金不足でプロジェクトを断念せざるを得なかった。,The company is abandoning the old factory this year.,その会社は今年、その古い工場を放棄しつつある。,The project had been abandoned before it was finished.,そのプロジェクトは終わる前に放棄されていた。
609,quit,/kwɪt/,動詞,やめる・辞める,quit doing 「〜するのをやめる」,He quit smoking three years ago.,彼は3年前に喫煙をやめた。,She is quitting her job next month.,彼女は来月、仕事を辞めるところだ。,He had quit smoking two years before.,彼はその2年前に禁煙していた。
610,capture,/ˈkæptʃər/,動詞,捕まえる・捉える,capture attention 「注目を捉える」,The exhibition captured the interest of many visitors.,展覧会は多くの訪問者の興味を捉えた。,The camera is capturing every moment of the event.,そのカメラはそのイベントのすべての瞬間を捉えている。,The suspect had already been captured by police.,容疑者はすでに警察に捕らえられていた。
611,transfer,/trænsˈfɜːr/,動詞・名詞,移す・転送,,She transferred to a different department.,彼女は別の部署に異動した。,She is transferring to a new department this week.,彼女は今週、新しい部署に異動しているところだ。,The funds had already been transferred before the audit.,その監査の前にすでに資金は移されていた。

613,persuade,/pəˈsweɪd/,動詞,説得する,persuade O to do 「Oに〜するよう説得する」,He persuaded his parents to let him study abroad.,彼は両親を説得して留学を許可させた。,She is persuading her boss to approve the budget.,彼女は上司にその予算を承認するよう説得しているところだ。,He had already been persuaded before the meeting started.,会議が始まる前に彼はすでに説得されていた。
614,rent,/rent/,動詞・名詞,賃借りする・家賃,,They rent an apartment near the university.,彼らは大学近くのアパートを借りている。,They are renting an apartment near the university.,彼らは大学の近くのアパートを借りているところだ。,The house had been rented out for over a decade.,その家は10年以上賃貸に出されていた。
615,breed,/briːd/,動詞・名詞,繁殖させる・品種,,Farmers breed cattle for milk production.,農家は牛乳生産のために牛を繁殖させる。,Farmers are breeding cattle for milk production.,農家は牛乳生産のために牛を繁殖させているところだ。,The rare bird had been bred successfully in captivity.,その珍しい鳥は飼育下でうまく繁殖されていた。
616,invest,/ɪnˈvest/,動詞,投資する,invest in … 「〜に投資する」,She invested in her education to advance her career.,彼女はキャリアを向上させるために教育に投資した。,She is investing in renewable energy stocks.,彼女は再生可能エネルギー株に投資しているところだ。,The company had invested heavily before the market crashed.,その会社は市場が暴落する前に多額の投資をしていた。
617,reserve,/rɪˈzɜːrv/,動詞・名詞,予約する・蓄え,,I'd like to reserve a table for two.,2名分のテーブルを予約したいのですが。,She is reserving a table for two tonight.,彼女は今夜、2名分のテーブルを予約しているところだ。,The seats had already been reserved before the show sold out.,そのショーが完売する前にすでに座席は予約されていた。
618,trace,/treɪs/,動詞・名詞,たどる・痕跡,,Police traced the call to a nearby city.,警察はその通話を近くの都市までたどった。,Police are tracing the call to a nearby city.,警察はその通話を近くの都市までたどっているところだ。,The origin of the disease had been traced to a local farm.,その病気の発生源は地元の農場までたどられていた。

620,advise,/ədˈvaɪz/,動詞,助言する,,The doctor advised her to rest more.,医師は彼女にもっと休むよう助言した。,The doctor is advising her to rest more.,医師は彼女にもっと休むよう助言しているところだ。,They had already been advised against the trip.,彼らはすでにその旅行について反対の助言を受けていた。
621,convey,/kənˈveɪ/,動詞,伝える・運ぶ,convey a message 「メッセージを伝える」,She conveyed her feelings through music.,彼女は音楽を通じて気持ちを伝えた。,The speech is conveying a clear message.,そのスピーチは明確なメッセージを伝えている。,Her gratitude had been conveyed through a handwritten note.,彼女の感謝の気持ちは手書きのメモで伝えられていた。

623,stretch,/stretʃ/,動詞・名詞,伸ばす・伸びをすること,,She stretched before going for a run.,彼女は走りに行く前にストレッチをした。,She is stretching before her morning run.,彼女は朝のランニングの前にストレッチをしているところだ。,The deadline had been stretched by two weeks.,その締め切りは2週間延ばされていた。
624,puzzle,/ˈpʌzl/,名詞・動詞,パズル・当惑させる,,The children worked on a jigsaw puzzle.,子供たちはジグソーパズルに取り組んだ。,She is puzzling over the difficult math problem.,彼女はその難しい数学の問題に頭を悩ませているところだ。,The mystery had puzzled detectives for years.,その謎は何年も刑事たちを困惑させていた。
625,disturb,/dɪˈstɜːrb/,動詞,邪魔する,,Please don't disturb her while she's studying.,彼女が勉強している間は邪魔しないでください。,The construction noise is disturbing the residents.,その工事の騒音は住民たちを悩ませている。,Her sleep had been disturbed by the storm.,彼女の睡眠はその嵐によって妨げられていた。
626,crash,/kræʃ/,動詞・名詞,衝突する・衝突,,The car crashed into a tree.,その車は木に衝突した。,The car is crashing through the barrier in the movie scene.,その映画のシーンで車はバリケードに突っ込んでいるところだ。,Two vehicles had crashed before help arrived.,助けが来る前に2台の車が衝突していた。
627,cope,/koʊp/,動詞,対処する,cope with … 「〜に対処する」,She learned to cope with stress effectively.,彼女はストレスに効果的に対処することを学んだ。,She is coping well with the stress of exams.,彼女は試験のストレスにうまく対処しているところだ。,He had coped with much worse situations before.,彼は以前にもっとひどい状況に対処していた。
628,permit,/pərˈmɪt/,動詞・名詞,許可する・許す,permit O to do 「Oが〜するのを許可する」,Smoking is not permitted inside the building.,建物内での喫煙は許可されていません。,The city is permitting outdoor dining this summer.,その市はこの夏、屋外での飲食を許可しているところだ。,The event had already been permitted by the council.,そのイベントはすでに議会によって許可されていた。
629,impress,/ɪmˈpres/,動詞,感銘を与える,,Her performance impressed the judges.,彼女の演技は審査員たちに感銘を与えた。,Her performance is impressing the judges.,彼女の演技は審査員たちに感銘を与えている。,The audience had been deeply impressed by the speech.,観客はそのスピーチに深く感銘を受けていた。

632,frighten,/ˈfraɪtn/,動詞,怖がらせる,,The loud noise frightened the baby.,その大きな音は赤ちゃんを怖がらせた。,The loud thunder is frightening the dog.,その大きな雷鳴はその犬を怖がらせている。,The children had been frightened by the storm the night before.,子供たちは前夜の嵐に怖がっていた。
633,import,/ˈɪmpɔːrt/,動詞・名詞,輸入する・輸入,,Japan imports most of its oil.,日本は石油のほとんどを輸入している。,The country is importing most of its oil.,その国はほとんどの石油を輸入している。,The goods had already been imported before the tariff increased.,その関税が引き上げられる前にすでにその商品は輸入されていた。
634,export,/ˈekspɔːrt/,動詞・名詞,輸出する・輸出,,The country exports rice to several nations.,その国はいくつかの国に米を輸出している。,The company is exporting rice to several nations.,その会社はいくつかの国に米を輸出しているところだ。,The technology had been exported to other countries by then.,その技術はその頃までに他国に輸出されていた。
635,investigate,/ɪnˈvestɪɡeɪt/,動詞,調査する・捜査する,investigate a crime 「犯罪を捜査する」,Police are investigating the suspicious incident.,警察は不審な出来事を捜査している。,Detectives are investigating the missing person case.,刑事たちはその行方不明事件を捜査しているところだ。,The accident had already been investigated by officials.,その事故はすでに当局によって調査されていた。
636,monitor,/ˈmɒnɪtər/,動詞・名詞,監視する・モニター,monitor progress 「進捗を監視する」,Teachers monitor students' progress regularly.,先生たちは定期的に生徒の進捗を監視する。,The system is monitoring air quality in real time.,そのシステムはリアルタイムで大気質を監視している。,Her heart rate had been monitored throughout the surgery.,彼女の心拍数はその手術中ずっと監視されていた。
637,calculate,/ˈkælkjuleɪt/,動詞,計算する・推測する,calculate the cost 「費用を計算する」,She calculated the total cost of the project.,彼女はプロジェクトの総費用を計算した。,She is calculating the total cost of the trip.,彼女はその旅行の総費用を計算しているところだ。,The risk had already been calculated before the launch.,その発売前にすでにそのリスクは計算されていた。

function parseCSV(t){
  const rows=[];let f='',row=[],q=false;
  t=t.replace(/^\uFEFF/,'').replace(/\r/g,'');
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){ if(c==='"'){ if(t[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else if(c==='"') q=true;
    else if(c===','){row.push(f);f='';}
    else if(c==='\n'){row.push(f);f='';if(row.some(x=>x!==''))rows.push(row);row=[];}
    else f+=c;
  }
  if(f!==''||row.length){row.push(f);if(row.some(x=>x!==''))rows.push(row);}
  const head=rows.shift();
  return rows.map(r=>{const o={};head.forEach((h,i)=>o[h.trim()]=(r[i]||'').trim());return o;});
}

const DOUBLE=/^(?:[^aeiou]*[aeiou][^aeiouwxy])$/; // 短母音+子音
function regular(v){
  if(/e$/.test(v)) return v+'d';
  if(/[^aeiou]y$/.test(v)) return v.slice(0,-1)+'ied';
  if(DOUBLE.test(v)) return v+v.slice(-1)+'ed';
  return v+'ed';
}
function verbForms(w){
  if(!/動詞/.test(w.pos)) return null;
  if(/句動詞/.test(w.pos)) return null;
  const v=w.en.toLowerCase();
  if(IRREG[v]) return {past:IRREG[v][0],pp:IRREG[v][1]};
  const r=regular(v);
  return {past:r,pp:r};
}

/* ================= 和訳バリエーション自動生成 ================= */
function jpVariants(s){
  const out=[s];
  const q=/[？?]$/.test(s), cmd=/(ください|なさい|しよう|ましょう)。$/.test(s);
  const base=s.replace(/。$/,'');
  const isDa=/だ$/.test(base);          // 「〜だ」
  const isNa=/(ない|ません)$/.test(base);
  const stem=isDa?base.slice(0,-1):base; // 「だ」を外した語幹
  const add=(x)=>{ if(out.length<11 && x && !out.includes(x)) out.push(x); };

  if(q||cmd){
    add('つまり、'+s); add('要するに、'+s); add('言い換えれば、'+s);
    add('端的に言えば、'+s); add('簡単に言うと、'+s); add('あらためて言えば、'+s);
    add('この文脈では、'+s); add('具体的には、'+s); add('実際のところ、'+s); add('わかりやすく言えば、'+s);
    return out.slice(0,11);
  }
  // 常体を前提とした語尾変換（文法的に安全な形のみ）
  add(isDa? stem+'なのだ。' : base+'のだ。');
  add(isDa? stem+'なのです。' : base+'のです。');
  add(base+'ということだ。');
  add(base+'と言える。');
  add(base+'と考えられる。');
  add(isDa? stem+'なわけだ。' : base+'わけだ。');
  add('つまり、'+s);
  add('言い換えれば、'+s);
  add('実際に、'+s);
  add(isNa? base+'ようだ。' : base+'ものだ。');
  add('要するに、'+base+'ということである。');
  return out.slice(0,11);
}

const POS_ORDER=['動詞','名詞','形容詞','副詞','句動詞','前置詞','接続詞'];
function posRank(p){const i=POS_ORDER.findIndex(x=>p.includes(x));return i<0?99:i;}
let deck=[];
function buildDeck(keepWord){
  WORDS = S.order==='other' ? WORDS_OTHER : WORDS_TARGET;
  let list=WORDS.filter(w=>!(S.hideMax && confOf(w)===3));
  if(S.section && S.section!=='all'){
    const [lo,hi]=S.section.split('-').map(Number);
    list=list.filter(w=>w.num>=lo && w.num<=hi);
  }
  if(S.search){
    const q=S.search.trim().toLowerCase();
    if(q) list=list.filter(w=>w.en.toLowerCase().includes(q));
  }
  if(S.order==='pos'){
    list=[...list].sort((a,b)=>posRank(a.pos)-posRank(b.pos)||a.num-b.num);
  }else if(S.order==='rand'){
    // 自信度が高いほど出にくい重み付きシャッフル
    const wgt=w=>[1,0.55,0.25,0.05][confOf(w)];
    list=[...list].map(w=>({w,k:Math.random()/wgt(w)})).sort((a,b)=>a.k-b.k).map(o=>o.w);
  }else{
    list=[...list].sort((a,b)=>a.num-b.num);
  }
  deck=list;
  if(keepWord){const i=deck.findIndex(w=>w.num===keepWord.num);S.idx=i<0?0:i;}
  if(S.idx>=deck.length)S.idx=0;
  slider.max=Math.max(0,deck.length-1);
}

  const wordBlock=`<div class="word" data-say="${esc(w.en)}">${esc(w.en)}<span class="spk">🔊</span></div>
      <div class="ph">${esc(w.ph)}</div><div class="pos">${esc(w.pos)}</div>
      ${vf?`<div class="forms">past: ${vf.past} &nbsp;/&nbsp; pp: ${vf.pp}</div>`:''}`;
  const meaning=`<div class="jp">${esc(w.jp)}</div><div class="note">${esc(w.note)}</div>`;
  const exList=[[w.ex_en,w.ex_jp],[w.ex_en2,w.ex_jp2],[w.ex_en3,w.ex_jp3]].filter(p=>p[0]);
  if(exIdx>=exList.length) exIdx=0;
  const [curEn,curJp]=exList[exIdx];
  const exSwitcher = exList.length>1 ? `<div class="exnav">
      <button class="exarrow" data-exdir="-1" aria-label="前の例文">‹</button>
      ${exList.map((_,k)=>`<span class="exdot${k===exIdx?' on':''}"></span>`).join('')}
      <button class="exarrow" data-exdir="1" aria-label="次の例文">›</button>
    </div>` : '';
  const exen=`<div class="exen" data-say="${esc(curEn)}">${esc(curEn)} <span class="spk">🔊</span></div>${exSwitcher}`;
  const exjp=`<div class="exjp">${esc(curJp)}</div>`;
  const order = S.face==='en' ? [wordBlock,meaning,exen,exjp] : [exjp,wordBlock,exen,meaning];
  return `<div class="faceLabel">${FACE_LABELS[S.face][i]}　${i+1}/4</div>`+order[i];
}

function render(count){
  if(!deck.length){empty.style.display='flex';card.style.display='none';return;}
  empty.style.display='none';card.style.display='flex';
  const w=deck[S.idx];
  if(count){S.seen[w.num]=seenOf(w)+1;}
  card.innerHTML=faceHTML(w,faceIdx);
  const c=confOf(w);
  topbar.style.borderTopColor=getComputedStyle(document.documentElement).getPropertyValue('--c'+c);
  counter.textContent=`${S.idx+1} / ${deck.length}`;
  seenEl.textContent=`👁 ${seenOf(w)}`;
  slider.value=S.idx;
  dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot${i===faceIdx?' on':''}"></div>`).join('');
  document.querySelectorAll('#conf button').forEach(b=>b.classList.toggle('on',+b.dataset.l===c));
  save();
}
function go(d){
  if(!deck.length)return;
  S.idx=(S.idx+d+deck.length)%deck.length;faceIdx=0;exIdx=0;render(true);
}
function flip(d){faceIdx=(faceIdx+d+4)%4;render(false);}

/* ================= 操作 ================= */
card.addEventListener('click',e=>{
  const arrow=e.target.closest('[data-exdir]');
  if(arrow){
    const exList=[deck[S.idx].ex_en,deck[S.idx].ex_en2,deck[S.idx].ex_en3].filter(Boolean);
    exIdx=(exIdx+(+arrow.dataset.exdir)+exList.length)%exList.length;
    render(false);e.stopPropagation();return;
  }
  const t=e.target.closest('[data-say]');
  if(t){speak(t.dataset.say);e.stopPropagation();return;}
  if(e.target.closest('.alts'))return;
  flip(1);
});
let sx=0,sy=0,touchOnArrow=false;
stage.addEventListener('touchstart',e=>{
  touchOnArrow=!!e.target.closest('[data-exdir]');
  sx=e.touches[0].clientX;sy=e.touches[0].clientY;
},{passive:true});
stage.addEventListener('touchend',e=>{
  if(touchOnArrow)return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
  if(Math.abs(dy)>Math.abs(dx)) go(dy<0?1:-1); else flip(dx<0?1:-1);
});
addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'&&e.shiftKey)go(1);
  else if(e.key==='ArrowUp')go(-1);
  else if(e.key==='ArrowRight')flip(1);
  else if(e.key==='ArrowLeft')flip(-1);
  else if(e.key===' '){e.preventDefault();flip(1);}
  else if(e.key>='0'&&e.key<='3')setConf(+e.key);
});
document.getElementById('next').onclick=()=>go(1);
document.getElementById('prev').onclick=()=>go(-1);
slider.oninput=()=>{S.idx=+slider.value;faceIdx=0;render(true);};
document.getElementById('speak').onclick=()=>{if(deck.length)speak(deck[S.idx].en);};

function setConf(l){
  if(!deck.length)return;
  const w=deck[S.idx];
  S.conf[w.num]=l;save();
  if(l===3&&S.hideMax){const keep=deck[(S.idx+1)%deck.length];buildDeck(keep);faceIdx=0;render(true);}
  else render(false);
}
document.querySelectorAll('#conf button').forEach(b=>b.onclick=()=>setConf(+b.dataset.l));

const orderSel=document.getElementById('order'),faceSel=document.getElementById('face'),
  hideBtn=document.getElementById('hideMax'),sectionSel=document.getElementById('section'),
  searchInput=document.getElementById('search');
orderSel.onchange=()=>{
  S.order=orderSel.value;
  S.section='all';
  rebuildSectionOptions();
  buildDeck();
  if(S.order==='rand')S.idx=0;
  faceIdx=0;exIdx=0;render(true);
};
faceSel.onchange=()=>{S.face=faceSel.value;faceIdx=0;render(false);};
function rebuildSectionOptions(){
  sectionSel.innerHTML='';
  const totalWords = S.order==='other' ? WORDS_OTHER.length : WORDS_TARGET.length;
  const allLabel = `全${totalWords}語`;
  const allOpt=document.createElement('option');
  allOpt.value='all'; allOpt.textContent=allLabel;
  sectionSel.appendChild(allOpt);
  for(let lo=1;lo<=totalWords;lo+=100){
    const hi=Math.min(lo+99,totalWords);
    const opt=document.createElement('option');
    opt.value=`${lo}-${hi}`;
    opt.textContent=`${lo}〜${hi}`;
    sectionSel.appendChild(opt);
  }
  sectionSel.value='all';
}
rebuildSectionOptions();
sectionSel.onchange=()=>{S.section=sectionSel.value;buildDeck();S.idx=0;faceIdx=0;exIdx=0;render(true);};
let searchTimer=null;
searchInput.oninput=()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    S.search=searchInput.value;
    buildDeck();
    S.idx=0;faceIdx=0;exIdx=0;render(true);
  },200);
};
function syncHide(){hideBtn.textContent=S.hideMax?'自信MAX非表示':'自信MAX表示中';
  hideBtn.style.borderColor=S.hideMax?'var(--c3)':'var(--border)';}
hideBtn.onclick=()=>{S.hideMax=!S.hideMax;syncHide();buildDeck(deck[S.idx]);render(false);};
document.getElementById('resetConf').onclick=()=>{S.conf={};buildDeck();render(true);};

/* ================= 起動 ================= */
orderSel.value=S.order;faceSel.value=S.face;syncHide();
searchInput.value=S.search;
rebuildSectionOptions();
sectionSel.value=S.section;
buildDeck();
render(true);   // 前回の続きから再開
</script>
</body>
</html>
